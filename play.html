<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الألعاب والمسابقات | أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e8edf2 100%); min-height: 100vh; }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --green-light: #90E0EF;
            --dark-bg: #1a2a3a;
            --shadow: 0 8px 30px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }
        .header {
            background: var(--dark-bg);
            color: white;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-img { height: 40px; width: auto; max-width: 140px; object-fit: contain; }
        .nav-links { display: flex; gap: 1.2rem; flex-wrap: wrap; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: var(--transition); }
        .nav-links a:hover { color: var(--gold-light); }

        .container { padding: 2rem 5%; max-width: 1200px; margin: 0 auto; }
        .page-title { text-align: center; margin-bottom: 2rem; }
        .page-title h1 { color: var(--dark-bg); font-size: 2.2rem; }
        .page-title h1 i { color: var(--sky-blue); }
        .page-title p { color: #666; font-size: 1.1rem; }

        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .game-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
        }
        .game-card:hover { transform: translateY(-10px); box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        .game-card .banner { height: 180px; background: linear-gradient(135deg, var(--sky-blue), var(--green-light)); display: flex; align-items: center; justify-content: center; font-size: 4rem; color: white; }
        .game-card .body { padding: 1.5rem; }
        .game-card .body h3 { font-size: 1.2rem; color: var(--dark-bg); }
        .game-card .body p { color: #666; font-size: 0.9rem; margin: 0.5rem 0; }
        .game-card .body .prizes { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.5rem 0; }
        .game-card .body .prize-tag { background: var(--gold-light); color: white; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.75rem; }
        .game-card .body .date { color: #999; font-size: 0.8rem; }
        .play-btn { background: linear-gradient(135deg, var(--gold-dark), var(--gold-light)); color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 30px; cursor: pointer; font-weight: 600; transition: var(--transition); margin-top: 0.5rem; }
        .play-btn:hover { transform: scale(1.05); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 600px; max-height: 90vh; border-radius: 25px; padding: 2rem; overflow-y: auto; }
        .modal-close { float: left; cursor: pointer; font-size: 1.5rem; color: #999; }

        .footer { background: var(--dark-bg); color: white; padding: 2rem 5%; text-align: center; margin-top: 3rem; }

        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .games-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .games-grid { grid-template-columns: 1fr; }
            .page-title h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <img src="https://i.servimg.com/u/f54/18/11/62/61/tm/picsar12.png" alt="أولاد شعلان" class="logo-img">
    <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
        <a href="store.html"><i class="fas fa-store"></i> المتجر</a>
        <a href="play.html"><i class="fas fa-gamepad"></i> الألعاب</a>
        <a href="track-order.html"><i class="fas fa-truck-fast"></i> تتبع الطلب</a>
    </div>
</header>

<div class="container">
    <div class="page-title">
        <h1><i class="fas fa-gamepad"></i> الألعاب والمسابقات</h1>
        <p>شارك في المسابقات واربح جوائز قيمة</p>
    </div>

    <div class="games-grid" id="gamesGrid">
        <p style="text-align:center;width:100%;color:#999;padding:2rem;">سيتم إعداد المسابقات و الألعاب قريبا</p>
    </div>
</div>

<!-- مودال تفاصيل اللعبة -->
<div id="gameModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeGameModal()">&times;</span>
        <div id="gameDetails"></div>
    </div>
</div>

<footer class="footer">
    <p>© 2026 متجر أولاد شعلان - جميع الحقوق محفوظة</p>
</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
        authDomain: "awlad-sh3lan-store.firebaseapp.com",
        projectId: "awlad-sh3lan-store",
        storageBucket: "awlad-sh3lan-store.firebasestorage.app",
        messagingSenderId: "77191704198",
        appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const typeIcons = { quiz: 'fa-pencil-alt', wheel: 'fa-spinner', speed: 'fa-bolt', puzzle: 'fa-puzzle-piece', points: 'fa-star' };
    const typeLabels = { quiz: 'مسابقة معرفية', wheel: 'عجلة الحظ', speed: 'مسابقة السرعة', puzzle: 'لغز اليوم', points: 'الكوبون السحري' };

    async function loadGames() {
        const snapshot = await db.collection('games').where('active', '==', true).orderBy('createdAt', 'desc').get();
        const container = document.getElementById('gamesGrid');

        if (snapshot.empty) {
            container.innerHTML = `
                <div style="text-align:center;padding:3rem;width:100%;">
                    <i class="fas fa-gamepad" style="font-size:3rem;color:#ccc;display:block;margin-bottom:1rem;"></i>
                    <p style="color:#999;font-size:1.1rem;">لا توجد ألعاب حالياً، ترقبوا الجديد!</p>
                </div>
            `;
            return;
        }

        container.innerHTML = snapshot.docs.map(doc => {
            const g = doc.data();
            const icon = typeIcons[g.type] || 'fa-gamepad';
            const label = typeLabels[g.type] || 'لعبة';
            return `
                <div class="game-card" onclick="openGame('${doc.id}')">
                    <div class="banner"><i class="fas ${icon}"></i></div>
                    <div class="body">
                        <h3>${g.title}</h3>
                        <p>${g.description || ''}</p>
                        <div class="prizes">
                            ${g.prizes?.map(p => `<span class="prize-tag">${p}</span>`).join('') || ''}
                        </div>
                        <div class="date"><i class="fas fa-calendar-alt"></i> ${g.startDate || ''} → ${g.endDate || ''}</div>
                        <button class="play-btn" onclick="event.stopPropagation();openGame('${doc.id}')"><i class="fas fa-play"></i> شارك الآن</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function openGame(id) {
        const doc = await db.collection('games').doc(id).get();
        const g = doc.data();
        const icon = typeIcons[g.type] || 'fa-gamepad';
        const label = typeLabels[g.type] || 'لعبة';

        document.getElementById('gameDetails').innerHTML = `
            <div style="text-align:center;padding:1rem 0;">
                <i class="fas ${icon}" style="font-size:3rem;color:var(--sky-blue);"></i>
                <h2 style="margin:0.5rem 0;">${g.title}</h2>
                <span style="background:var(--gold-light);color:white;padding:0.2rem 1rem;border-radius:20px;font-size:0.8rem;">${label}</span>
                <p style="margin:1rem 0;">${g.description || ''}</p>
                <div style="background:#f9f9f9;padding:1rem;border-radius:15px;margin:1rem 0;">
                    <h4>🎁 الجوائز</h4>
                    ${g.prizes?.map(p => `<div style="padding:0.3rem 0;">${p}</div>`).join('') || '<p style="color:#999;">لا توجد جوائز محددة</p>'}
                </div>
                <div style="color:#888;font-size:0.9rem;">
                    <i class="fas fa-calendar-alt"></i> ${g.startDate || ''} → ${g.endDate || ''}
                </div>
                <button onclick="alert('سيتم نقلك إلى صفحة اللعبة قريباً!')" style="background:linear-gradient(135deg,var(--gold-dark),var(--gold-light));color:white;border:none;padding:0.8rem 2rem;border-radius:30px;cursor:pointer;font-weight:700;font-size:1.1rem;margin-top:1.5rem;">
                    <i class="fas fa-play"></i> ابدأ اللعب
                </button>
            </div>
        `;
        document.getElementById('gameModal').style.display = 'flex';
    }

    function closeGameModal() {
        document.getElementById('gameModal').style.display = 'none';
    }

    loadGames();
    window.openGame = openGame;
    window.closeGameModal = closeGameModal;
</script>

</body>
</html>
