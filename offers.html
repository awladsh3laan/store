<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العروض | أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --green-light: #90E0EF;
            --dark-bg: #1a2a3a;
            --shadow: 0 8px 25px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
        }
        .header {
            background: var(--dark-bg);
            color: white;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-img { height: 40px; width: auto; max-width: 140px; object-fit: contain; }
        .nav-links { display: flex; gap: 1.2rem; flex-wrap: wrap; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: var(--transition); }
        .nav-links a:hover { color: var(--gold-light); }

        .container { padding: 2rem 5%; max-width: 1200px; margin: 0 auto; }
        .page-title { text-align: center; margin-bottom: 2rem; }
        .page-title h1 { color: var(--dark-bg); font-size: 2.2rem; }
        .page-title h1 i { color: var(--gold-dark); }
        .page-title p { color: #666; font-size: 1.1rem; }

        .offers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem; }
        .offer-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
        }
        .offer-card:hover { transform: translateY(-8px); box-shadow: 0 15px 40px rgba(0,0,0,0.12); }
        .offer-card .discount-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #dc3545;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 2;
        }
        .offer-card img { width: 100%; height: 200px; object-fit: cover; }
        .offer-card .info { padding: 1.5rem; }
        .offer-card .info h3 { font-size: 1.1rem; color: var(--dark-bg); }
        .offer-card .info .price { color: var(--gold-dark); font-weight: 800; font-size: 1.3rem; }
        .offer-card .info .old-price { text-decoration: line-through; color: #999; font-size: 0.9rem; margin-right: 0.5rem; }
        .offer-card .info .save { color: #28a745; font-weight: 700; }
        .add-btn {
            width: 100%;
            padding: 0.7rem;
            border: none;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .add-btn:hover { background: linear-gradient(135deg, var(--sky-blue), var(--green-light)); }

        .footer { background: var(--dark-bg); color: white; padding: 2rem 5%; text-align: center; margin-top: 3rem; }

        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .offers-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
        }
        @media (max-width: 480px) {
            .offers-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="header">
    <img src="https://i.servimg.com/u/f54/18/11/62/61/tm/picsar12.png" alt="أولاد شعلان" class="logo-img">
    <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
        <a href="store.html"><i class="fas fa-store"></i> المتجر</a>
        <a href="offers.html"><i class="fas fa-tags"></i> العروض</a>
        <a href="track-order.html"><i class="fas fa-truck-fast"></i> تتبع الطلب</a>
    </div>
</header>

<div class="container">
    <div class="page-title">
        <h1><i class="fas fa-tags"></i> العروض والتخفيضات</h1>
        <p>أفضل العروض على منتجاتنا بأسعار لا تُقاوم</p>
    </div>

    <div class="offers-grid" id="offersGrid">
        <p style="text-align:center;width:100%;color:#999;padding:2rem;">جاري تحميل العروض...</p>
    </div>
</div>

<footer class="footer">
    <p>© 2026 متجر أولاد شعلان - جميع الحقوق محفوظة</p>
</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
        authDomain: "awlad-sh3lan-store.firebaseapp.com",
        projectId: "awlad-sh3lan-store",
        storageBucket: "awlad-sh3lan-store.firebasestorage.app",
        messagingSenderId: "77191704198",
        appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    async function loadOffers() {
        const snapshot = await db.collection('products')
            .where('discountPrice', '>', 0)
            .get();

        const container = document.getElementById('offersGrid');

        if (snapshot.empty) {
            container.innerHTML = `
                <div style="text-align:center;padding:3rem;width:100%;">
                    <i class="fas fa-tags" style="font-size:3rem;color:#ccc;display:block;margin-bottom:1rem;"></i>
                    <p style="color:#999;font-size:1.1rem;">لا توجد عروض حالياً، ترقبوا الجديد!</p>
                </div>
            `;
            return;
        }

        container.innerHTML = snapshot.docs.map(doc => {
            const p = doc.data();
            const discount = Math.round(((p.price - p.discountPrice) / p.price) * 100);
            return `
                <div class="offer-card">
                    <span class="discount-badge">🔥 خصم ${discount}%</span>
                    <img src="${p.images && p.images[0] ? p.images[0] : 'https://via.placeholder.com/250'}" alt="${p.name}">
                    <div class="info">
                        <h3>${p.name}</h3>
                        <div>
                            <span class="price">${p.discountPrice} جنيه</span>
                            <span class="old-price">${p.price} جنيه</span>
                        </div>
                        <span class="save">💰 وفر ${(p.price - p.discountPrice).toFixed(2)} جنيه</span>
                    </div>
                    <button class="add-btn" onclick="addToCart('${doc.id}')"><i class="fas fa-cart-plus"></i> أضف للسلة</button>
                </div>
            `;
        }).join('');
    }

    function addToCart(productId) {
        // سنضيف لاحقاً ربطاً مع المنتجات الفعلية
        alert('تم إضافة المنتج إلى السلة!');
    }

    loadOffers();
    window.addToCart = addToCart;
</script>

</body>
</html>
