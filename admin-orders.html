<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات - متجر أولاد شعلان</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <!-- Style -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* استايلات إدارة الطلبات */
        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .filter-box {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .filter-box select, .filter-box input {
            padding: 10px 15px;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .filter-box button {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .reset-filter {
            background: var(--gray-text);
        }
        
        .order-details-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .order-details-container {
            background: white;
            border-radius: 20px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }
        
        .order-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #EEE;
        }
        
        .order-info-item {
            background: var(--light-bg);
            padding: 10px;
            border-radius: 10px;
        }
        
        .order-info-item label {
            font-size: 12px;
            color: var(--gray-text);
            display: block;
        }
        
        .order-info-item .value {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-dark);
        }
        
        .products-list {
            margin: 20px 0;
        }
        
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #EEE;
        }
        
        .status-select {
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        
        .status-pending { background: #F39C12; color: white; }
        .status-confirmed { background: #00B4D8; color: white; }
        .status-shipped { background: #DAA520; color: white; }
        .status-delivered { background: #2ECC71; color: white; }
        .status-cancelled { background: #E74C3C; color: white; }
        
        .order-total {
            font-size: 20px;
            font-weight: bold;
            color: var(--success-green);
            text-align: left;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #EEE;
        }
        
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }
        
        .view-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .export-btn {
            background: var(--secondary-gold);
            color: var(--primary-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- الشريط الجانبي -->
        <div class="admin-sidebar">
            <h3><i class="fas fa-store"></i> متجر أولاد شعلان</h3>
            <a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> لوحة التحكم</a>
            <a href="admin-products.html"><i class="fas fa-box"></i> المنتجات</a>
            <a href="admin-slider.html"><i class="fas fa-images"></i> السلايدر</a>
            <a href="admin-shipping.html"><i class="fas fa-truck"></i> الشحن</a>
            <a href="admin-orders.html" class="active"><i class="fas fa-list"></i> الطلبات</a>
            <a href="#" id="sidebarLogout"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</a>
        </div>
        
        <!-- المحتوى الرئيسي -->
        <div class="admin-content">
            <div class="orders-header">
                <h2><i class="fas fa-truck"></i> إدارة الطلبات</h2>
                <div style="display: flex; gap: 15px;">
                    <button class="export-btn" id="exportBtn">
                        <i class="fas fa-file-excel"></i> تصدير Excel
                    </button>
                </div>
            </div>
            
            <!-- فلتر البحث -->
            <div class="filter-box">
                <select id="statusFilter">
                    <option value="all">جميع الحالات</option>
                    <option value="pending">قيد المراجعة</option>
                    <option value="confirmed">تم التأكيد</option>
                    <option value="shipped">تم الشحن</option>
                    <option value="delivered">تم التوصيل</option>
                    <option value="cancelled">ملغي</option>
                </select>
                <input type="text" id="searchInput" placeholder="بحث برقم الطلب أو الهاتف">
                <button id="searchBtn"><i class="fas fa-search"></i> بحث</button>
                <button id="resetBtn" class="reset-filter"><i class="fas fa-undo"></i> إعادة تعيين</button>
            </div>
            
            <div style="overflow-x: auto; margin-top: 20px;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>رقم الطلب</th>
                            <th>العميل</th>
                            <th>الهاتف</th>
                            <th>الإجمالي</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                            <th>إجراءات</th>
                        </thead>
                    <tbody id="ordersList">
                        <tr>
                            <td colspan="7" style="text-align: center;">جاري التحميل...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- نافذة تفاصيل الطلب -->
    <div class="order-details-modal" id="orderModal">
        <div class="order-details-container">
            <div class="form-header">
                <h3><i class="fas fa-receipt"></i> تفاصيل الطلب</h3>
                <button class="close-form" id="closeModalBtn">&times;</button>
            </div>
            <div id="orderDetailsContent">
                <!-- يتم تعبئتها ديناميكياً -->
            </div>
        </div>
    </div>
    
    <!-- تحميل التحميل -->
    <div class="loading-overlay" id="loadingOverlay">
        <div><i class="fas fa-spinner fa-spin"></i> جاري المعالجة...</div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>

    <!-- Firebase Config -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
            authDomain: "awlad-sh3lan-store.firebaseapp.com",
            projectId: "awlad-sh3lan-store",
            storageBucket: "awlad-sh3lan-store.firebasestorage.app",
            messagingSenderId: "77191704198",
            appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
    </script>

    <!-- Orders Script -->
    <script>
        let allOrders = [];
        
        // التحقق من صلاحية الأدمن
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'admin-login.html';
                return;
            }
            const adminDoc = await db.collection('admins').doc(user.uid).get();
            if (!adminDoc.exists) {
                await auth.signOut();
                window.location.href = 'admin-login.html';
                return;
            }
            loadOrders();
        });
        
        // تحميل الطلبات
        async function loadOrders() {
            try {
                const snapshot = await db.collection('orders').orderBy('createdAt', 'desc').get();
                allOrders = [];
                snapshot.forEach(doc => {
                    allOrders.push({ id: doc.id, ...doc.data() });
                });
                displayOrders(allOrders);
            } catch (error) {
                console.error('خطأ في تحميل الطلبات:', error);
                showToast('حدث خطأ في تحميل الطلبات', 'error');
            }
        }
        
        // عرض الطلبات
        function displayOrders(orders) {
            const tbody = document.getElementById('ordersList');
            
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">لا توجد طلبات</td></tr>';
                return;
            }
            
            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td><strong>#${order.id.slice(0, 8)}</strong></td>
                    <td>${escapeHtml(order.customerName || '-')}</td>
                    <td dir="ltr">${order.phone || '-'}</td>
                    <td style="color: var(--success-green); font-weight: bold;">${(order.total || 0).toLocaleString()} ج.م</td>
                    <td>${getStatusBadge(order.status)}</td>
                    <td>${formatDate(order.createdAt)}</td>
                    <td>
                        <button class="view-btn" onclick="viewOrder('${order.id}')">
                            <i class="fas fa-eye"></i> تفاصيل
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function getStatusBadge(status) {
            const statusMap = {
                'pending': '<span class="badge" style="background:#F39C12;color:white;"><i class="fas fa-clock"></i> قيد المراجعة</span>',
                'confirmed': '<span class="badge" style="background:#00B4D8;color:white;"><i class="fas fa-check"></i> تم التأكيد</span>',
                'shipped': '<span class="badge" style="background:#DAA520;color:white;"><i class="fas fa-truck"></i> تم الشحن</span>',
                'delivered': '<span class="badge" style="background:#2ECC71;color:white;"><i class="fas fa-check-circle"></i> تم التوصيل</span>',
                'cancelled': '<span class="badge" style="background:#E74C3C;color:white;"><i class="fas fa-times"></i> ملغي</span>'
            };
            return statusMap[status] || '<span class="badge" style="background:#95A5A6;color:white;">غير معروف</span>';
        }
        
        // عرض تفاصيل الطلب
        window.viewOrder = async (orderId) => {
            try {
                const doc = await db.collection('orders').doc(orderId).get();
                if (doc.exists) {
                    const order = { id: doc.id, ...doc.data() };
                    displayOrderDetails(order);
                    document.getElementById('orderModal').style.display = 'flex';
                }
            } catch (error) {
                console.error('خطأ في جلب تفاصيل الطلب:', error);
                showToast('حدث خطأ', 'error');
            }
        };
        
        function displayOrderDetails(order) {
            const container = document.getElementById('orderDetailsContent');
            
            // حساب الإجمالي من المنتجات
            let productsTotal = 0;
            const productsHtml = (order.products || []).map(product => {
                const itemTotal = (product.price || 0) * (product.quantity || 1);
                productsTotal += itemTotal;
                return `
                    <div class="product-item">
                        <span><strong>${escapeHtml(product.name)}</strong> x ${product.quantity}</span>
                        <span>${itemTotal.toLocaleString()} ج.م</span>
                    </div>
                `;
            }).join('');
            
            const finalTotal = order.total || productsTotal;
            
            container.innerHTML = `
                <div class="order-info-grid">
                    <div class="order-info-item">
                        <label>رقم الطلب</label>
                        <div class="value">#${order.id}</div>
                    </div>
                    <div class="order-info-item">
                        <label>التاريخ</label>
                        <div class="value">${formatDate(order.createdAt)}</div>
                    </div>
                    <div class="order-info-item">
                        <label>اسم العميل</label>
                        <div class="value">${escapeHtml(order.customerName || '-')}</div>
                    </div>
                    <div class="order-info-item">
                        <label>رقم الهاتف</label>
                        <div class="value" dir="ltr">${order.phone || '-'}</div>
                    </div>
                    <div class="order-info-item">
                        <label>العنوان</label>
                        <div class="value">${escapeHtml(order.address || '-')}</div>
                    </div>
                    <div class="order-info-item">
                        <label>طريقة الدفع</label>
                        <div class="value">${escapeHtml(order.paymentMethod || '-')}</div>
                    </div>
                </div>
                
                <h4 style="margin: 20px 0 10px;">المنتجات</h4>
                <div class="products-list">
                    ${productsHtml || '<p>لا توجد منتجات</p>'}
                </div>
                
                <div class="order-total">
                    الإجمالي: ${finalTotal.toLocaleString()} ج.م
                </div>
                
                <div style="margin-top: 20px;">
                    <label style="display: block; margin-bottom: 10px; font-weight: bold;">تحديث حالة الطلب</label>
                    <select id="orderStatusSelect" class="status-select" style="width: 100%; padding: 12px;">
                        <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>⏳ قيد المراجعة</option>
                        <option value="confirmed" ${order.status === 'confirmed' ? 'selected' : ''}>✅ تم التأكيد</option>
                        <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>🚚 تم الشحن</option>
                        <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>🎉 تم التوصيل</option>
                        <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>❌ ملغي</option>
                    </select>
                    <button onclick="updateOrderStatus('${order.id}')" style="margin-top: 15px; width: 100%;" class="btn btn-primary">
                        <i class="fas fa-save"></i> حفظ التغييرات
                    </button>
                </div>
            `;
        }
        
        // تحديث حالة الطلب
        window.updateOrderStatus = async (orderId) => {
            const newStatus = document.getElementById('orderStatusSelect').value;
            showLoading(true);
            
            try {
                await db.collection('orders').doc(orderId).update({ status: newStatus });
                showToast('تم تحديث حالة الطلب بنجاح', 'success');
                document.getElementById('orderModal').style.display = 'none';
                loadOrders();
            } catch (error) {
                console.error('خطأ في تحديث الحالة:', error);
                showToast('حدث خطأ', 'error');
            } finally {
                showLoading(false);
            }
        };
        
        // الفلترة والبحث
        document.getElementById('searchBtn').addEventListener('click', () => {
            const status = document.getElementById('statusFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = [...allOrders];
            
            if (status !== 'all') {
                filtered = filtered.filter(order => order.status === status);
            }
            
            if (searchTerm) {
                filtered = filtered.filter(order => 
                    order.id.toLowerCase().includes(searchTerm) ||
                    (order.phone && order.phone.includes(searchTerm)) ||
                    (order.customerName && order.customerName.toLowerCase().includes(searchTerm))
                );
            }
            
            displayOrders(filtered);
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('searchInput').value = '';
            displayOrders(allOrders);
        });
        
        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('orderModal').style.display = 'none';
        });
        
        // تصدير Excel
        document.getElementById('exportBtn').addEventListener('click', () => {
            const headers = ['رقم الطلب', 'العميل', 'الهاتف', 'العنوان', 'الإجمالي', 'الحالة', 'التاريخ'];
            const rows = allOrders.map(order => [
                order.id,
                order.customerName || '',
                order.phone || '',
                order.address || '',
                order.total || 0,
                order.status || '',
                formatDate(order.createdAt)
            ]);
            
            let csv = headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(cell => `"${cell}"`).join(',') + '\n';
            });
            
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', 'orders.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showToast('تم تصدير الطلبات بنجاح', 'success');
        });
        
        // تسجيل الخروج
        document.getElementById('sidebarLogout').addEventListener('click', async () => {
            await auth.signOut();
            window.location.href = 'admin-login.html';
        });
        
        function formatDate(timestamp) {
            if (!timestamp) return '-';
            try {
                const date = timestamp.toDate();
                return `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()} ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
            } catch (e) {
                return '-';
            }
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type}`;
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.zIndex = '9999';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // إغلاق النافذة عند الضغط خارجها
        window.onclick = (event) => {
            const modal = document.getElementById('orderModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
    
    <style>
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
        }
    </style>
</body>
</html>
