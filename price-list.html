<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الأسعار | أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f0f2f5;
            font-size: 16px;
            line-height: 1.6;
        }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --dark-bg: #1a2a3a;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
            --radius: 16px;
            --radius-sm: 10px;
        }

        .header {
            background: var(--dark-bg);
            color: white;
            padding: 0.6rem 4%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-img {
            height: 40px;
            width: auto;
            max-width: 140px;
            object-fit: contain;
        }
        .nav-links {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.8rem;
            transition: var(--transition);
        }
        .nav-links a:hover {
            color: var(--gold-light);
        }

        .container {
            padding: 1rem 4%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-title {
            text-align: center;
            color: var(--gold-dark);
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
        }
        .page-title i {
            margin-left: 0.3rem;
        }
        .page-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 1.2rem;
            font-size: 0.95rem;
        }

        .actions {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 1.2rem;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn:hover {
            transform: scale(1.03);
        }
        .btn-warning {
            background: var(--gold-dark);
            color: white;
        }
        .btn-warning:hover {
            background: #a0700a;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover {
            background: #218838;
        }
        .btn-primary {
            background: var(--sky-blue);
            color: white;
        }
        .btn-primary:hover {
            background: #0098b8;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .search-box {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 1.2rem;
        }
        .search-box input {
            padding: 0.7rem 1.2rem;
            border: 1px solid #ddd;
            border-radius: 30px;
            min-width: 200px;
            flex: 1;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }
        .search-box input:focus {
            border-color: var(--sky-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.1);
        }

        .table-wrap {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th,
        td {
            padding: 0.6rem 0.4rem;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        th {
            background: var(--sky-blue);
            color: white;
            font-weight: 700;
        }
        tr:hover td {
            background: #f9f9f9;
        }
        .total-row {
            background: #f9f9f9;
            font-weight: 700;
        }
        .total-row td {
            border-top: 2px solid var(--gold-dark);
        }
        .footer-note {
            padding: 0.8rem;
            text-align: center;
            color: #999;
            font-size: 0.8rem;
        }

        .spinner {
            display: none;
            text-align: center;
            padding: 0.5rem;
        }
        .spinner.show {
            display: block;
        }
        .spinner i {
            font-size: 1.5rem;
            animation: spin 1s linear infinite;
            color: var(--sky-blue);
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .footer {
            background: var(--dark-bg);
            color: white;
            padding: 1.5rem 5%;
            text-align: center;
            font-size: 0.85rem;
            margin-top: 2rem;
        }

        @media print {
            .header,
            .actions,
            .search-box,
            .footer {
                display: none;
            }
            .table-wrap {
                box-shadow: none;
                border-radius: 0;
            }
            body {
                background: white;
            }
            .container {
                padding: 0.5rem;
            }
            .page-title {
                font-size: 1.2rem;
            }
        }

        @media (min-width: 600px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                padding: 0.8rem 5%;
            }
            .nav-links a {
                font-size: 0.95rem;
            }
            .container {
                padding: 1.5rem 5%;
            }
            .page-title {
                font-size: 2rem;
            }
            table {
                font-size: 0.95rem;
            }
            th,
            td {
                padding: 0.8rem 0.6rem;
            }
        }

        @media (max-width: 600px) {
            /* تحويل الجدول إلى بطاقات على الجوال */
            table thead {
                display: none;
            }
            table tbody tr {
                display: block;
                margin-bottom: 1rem;
                border: 1px solid #ddd;
                border-radius: var(--radius-sm);
                padding: 0.8rem;
                background: white;
                box-shadow: var(--shadow);
            }
            table tbody td {
                display: flex;
                justify-content: space-between;
                padding: 0.3rem 0;
                border-bottom: 1px solid #eee;
                font-size: 0.85rem;
            }
            table tbody td:last-child {
                border-bottom: none;
            }
            table tbody td::before {
                content: attr(data-label);
                font-weight: 700;
                color: var(--gold-dark);
                margin-left: 0.5rem;
            }
            .total-row td {
                display: flex;
                justify-content: space-between;
                border-top: 2px solid var(--gold-dark);
            }
            .total-row td::before {
                content: attr(data-label);
                font-weight: 700;
            }
            .btn {
                font-size: 0.8rem;
                padding: 0.4rem 0.8rem;
            }
            .search-box input {
                min-width: 150px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="https://i.servimg.com/u/f54/18/11/62/61/tm/picsar12.png" alt="أولاد شعلان" class="logo-img">
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="store.html"><i class="fas fa-store"></i> المتجر</a>
            <a href="price-list.html"><i class="fas fa-file-invoice-dollar"></i> عرض الأسعار</a>
            <a href="track-order.html"><i class="fas fa-truck-fast"></i> تتبع الطلب</a>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title"><i class="fas fa-file-invoice-dollar"></i> عرض الأسعار</h1>
        <p class="page-subtitle">قائمة أسعار منتجات متجر أولاد شعلان</p>

        <div class="actions">
            <button class="btn btn-warning" onclick="printPriceList()"><i class="fas fa-print"></i> طباعة</button>
            <button class="btn btn-success" id="pdfBtn" onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> تحميل PDF</button>
            <button class="btn btn-primary" id="excelBtn" onclick="exportExcel()"><i class="fas fa-file-excel"></i> تصدير Excel</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 بحث في القائمة..." onkeyup="filterTable()">
        </div>

        <div class="spinner" id="exportSpinner"><i class="fas fa-spinner"></i> جاري التصدير...</div>

        <div class="table-wrap" id="priceTableWrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>المنتج</th>
                        <th>التصنيف</th>
                        <th>البراند</th>
                        <th>السعر (ج)</th>
                        <th>سعر العرض</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
                <tfoot id="tableFoot"></tfoot>
            </table>
            <div class="footer-note">
                * الأسعار قابلة للتغيير حسب العروض والتخفيضات
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 متجر أولاد شعلان - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
            authDomain: "awlad-sh3lan-store.firebaseapp.com",
            projectId: "awlad-sh3lan-store",
            storageBucket: "awlad-sh3lan-store.firebasestorage.app",
            messagingSenderId: "77191704198",
            appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allProducts = [];
        let categoriesMap = {};
        let brandsMap = {};

        // ===== تحميل البيانات =====
        async function loadData() {
            try {
                // تحميل التصنيفات
                const catSnap = await db.collection('categories').get();
                catSnap.forEach(d => { categoriesMap[d.id] = d.data().name; });

                // تحميل البراندات
                const brandSnap = await db.collection('brands').get();
                brandSnap.forEach(d => { brandsMap[d.id] = d.data().name; });

                // تحميل المنتجات
                const prodSnap = await db.collection('products').get();
                allProducts = prodSnap.docs.map(d => ({
                    id: d.id,
                    ...d.data(),
                    categoryName: categoriesMap[d.data().categoryId] || '-',
                    brandName: brandsMap[d.data().brandId] || '-'
                }));

                renderTable(allProducts);
            } catch (error) {
                console.error('خطأ في تحميل البيانات:', error);
                document.getElementById('tableBody').innerHTML =
                    '<tr><td colspan="6" style="padding:1rem;color:#dc3545;">حدث خطأ في تحميل البيانات</td></tr>';
            }
        }

        // ===== عرض الجدول =====
        function renderTable(products) {
            const tbody = document.getElementById('tableBody');
            const tfoot = document.getElementById('tableFoot');

            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="padding:1.5rem;color:#999;text-align:center;">لا توجد منتجات</td></tr>';
                tfoot.innerHTML = '';
                return;
            }

            let total = 0;
            tbody.innerHTML = products.map((p, i) => {
                const price = p.discountPrice || p.price;
                total += price;
                return `<tr>
                    <td data-label="#"><strong>${i + 1}</strong></td>
                    <td data-label="المنتج">${p.name || '-'}</td>
                    <td data-label="التصنيف">${p.categoryName}</td>
                    <td data-label="البراند">${p.brandName}</td>
                    <td data-label="السعر"><strong>${p.price}</strong></td>
                    <td data-label="سعر العرض">${p.discountPrice ? `<span style="color:#28a745;font-weight:700;">${p.discountPrice}</span>` : '-'}</td>
                </tr>`;
            }).join('');

            tfoot.innerHTML = `
                <tr class="total-row">
                    <td colspan="4" data-label="الإجمالي" style="text-align:left;"><strong>الإجمالي</strong></td>
                    <td colspan="2" data-label="القيمة"><strong>${total.toFixed(2)} جنيه</strong></td>
                </tr>
                <tr>
                    <td colspan="6" style="text-align:center;font-size:0.8rem;color:#888;">
                        عدد المنتجات المعروضة: ${products.length}
                    </td>
                </tr>
            `;
        }

        // ===== فلترة =====
        function filterTable() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!search) {
                renderTable(allProducts);
                return;
            }
            const filtered = allProducts.filter(p =>
                (p.name || '').toLowerCase().includes(search) ||
                (p.categoryName || '').toLowerCase().includes(search) ||
                (p.brandName || '').toLowerCase().includes(search)
            );
            renderTable(filtered);
        }

        // ===== طباعة =====
        function printPriceList() {
            window.print();
        }

        // ===== تحميل PDF =====
        function downloadPDF() {
            const btn = document.getElementById('pdfBtn');
            const spinner = document.getElementById('exportSpinner');
            btn.disabled = true;
            spinner.classList.add('show');

            const element = document.getElementById('priceTableWrap');
            // إزالة الفوتر المؤقت للطباعة
            const originalNote = element.querySelector('.footer-note');
            
            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `price-list-${new Date().toISOString().slice(0,10)}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true, useCORS: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.disabled = false;
                spinner.classList.remove('show');
            }).catch((error) => {
                console.error('خطأ في PDF:', error);
                alert('حدث خطأ في تحميل PDF: ' + error.message);
                btn.disabled = false;
                spinner.classList.remove('show');
            });
        }

        // ===== تصدير Excel (CSV) =====
        function exportExcel() {
            const btn = document.getElementById('excelBtn');
            const spinner = document.getElementById('exportSpinner');
            btn.disabled = true;
            spinner.classList.add('show');

            try {
                const search = document.getElementById('searchInput').value.toLowerCase().trim();
                let data = allProducts;
                if (search) {
                    data = allProducts.filter(p =>
                        (p.name || '').toLowerCase().includes(search) ||
                        (p.categoryName || '').toLowerCase().includes(search) ||
                        (p.brandName || '').toLowerCase().includes(search)
                    );
                }

                // إنشاء CSV
                let csv = "الرقم,المنتج,التصنيف,البراند,السعر,سعر العرض\n";
                data.forEach((p, i) => {
                    csv +=
                        `${i+1},"${(p.name || '').replace(/"/g, '""')}","${(p.categoryName || '').replace(/"/g, '""')}","${(p.brandName || '').replace(/"/g, '""')}",${p.price},${p.discountPrice || ''}\n`;
                });

                // إضافة BOM لدعم العربية
                const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `price-list-${new Date().toISOString().slice(0,10)}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);

                btn.disabled = false;
                spinner.classList.remove('show');
            } catch (error) {
                console.error('خطأ في تصدير Excel:', error);
                alert('حدث خطأ في تصدير Excel: ' + error.message);
                btn.disabled = false;
                spinner.classList.remove('show');
            }
        }

        // ===== التحميل =====
        loadData();

        window.filterTable = filterTable;
        window.printPriceList = printPriceList;
        window.downloadPDF = downloadPDF;
        window.exportExcel = exportExcel;
    </script>

</body>
</html>
