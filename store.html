<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتجر | أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f0f2f5;
            font-size: 16px;
            line-height: 1.6;
        }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --green-light: #90E0EF;
            --dark-bg: #1a2a3a;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
            --radius: 16px;
            --radius-sm: 10px;
        }

        .header {
            background: var(--dark-bg);
            color: white;
            padding: 0.6rem 4%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-img {
            height: 40px;
            width: auto;
            max-width: 140px;
            object-fit: contain;
        }
        .nav-links {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.8rem;
            transition: var(--transition);
        }
        .nav-links a:hover {
            color: var(--gold-light);
        }
        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--gold-dark);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (min-width: 600px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                padding: 0.8rem 5%;
            }
            .nav-links a {
                font-size: 0.95rem;
            }
        }

        .container {
            padding: 1rem 4%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== البحث ===== */
        .search-bar {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
            background: white;
            padding: 0.8rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .search-bar input {
            flex: 1;
            padding: 0.7rem 1rem;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-family: inherit;
            font-size: 1rem;
            min-width: 150px;
            transition: var(--transition);
        }
        .search-bar input:focus {
            border-color: var(--sky-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.1);
        }
        .search-bar select {
            padding: 0.7rem 1rem;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-family: inherit;
            font-size: 1rem;
            background: white;
        }

        /* ===== التصنيفات (أفقية مع تمرير) ===== */
        .categories-bar {
            display: flex;
            gap: 0.6rem;
            overflow-x: auto;
            padding: 0.5rem 0;
            margin-bottom: 1rem;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .categories-bar::-webkit-scrollbar {
            height: 4px;
        }
        .categories-bar::-webkit-scrollbar-thumb {
            background: var(--sky-blue);
            border-radius: 10px;
        }
        .cat-btn {
            flex: 0 0 auto;
            padding: 0.4rem 1.2rem;
            border: 2px solid #ddd;
            border-radius: 30px;
            background: white;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .cat-btn:hover {
            border-color: var(--sky-blue);
        }
        .cat-btn.active {
            border-color: var(--sky-blue);
            background: var(--sky-blue);
            color: white;
        }

        /* ===== البراندات (أفقية مع تمرير) ===== */
        .brands-row {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            padding: 0.6rem 0.8rem;
            margin-bottom: 1.2rem;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            align-items: center;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .brands-row::-webkit-scrollbar {
            height: 4px;
        }
        .brands-row::-webkit-scrollbar-thumb {
            background: var(--gold-dark);
            border-radius: 10px;
        }
        .brands-row .label {
            font-weight: 700;
            color: var(--gold-dark);
            font-size: 0.85rem;
            flex: 0 0 auto;
        }
        .brand-item {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            background: #f9f9f9;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .brand-item:hover {
            background: var(--sky-blue);
            color: white;
        }
        .brand-item.active {
            border-color: var(--gold-dark);
            background: var(--gold-light);
            color: white;
        }
        .brand-item img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* ===== المنتجات ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
        }
        .product-card {
            background: white;
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .product-card .info {
            padding: 0.6rem;
        }
        .product-card .info h3 {
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
            color: var(--dark-bg);
        }
        .product-card .info .price {
            color: var(--gold-dark);
            font-weight: 800;
            font-size: 1.1rem;
        }
        .product-card .info .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 0.75rem;
            margin-right: 0.3rem;
        }
        .product-card .info .stock {
            font-size: 0.7rem;
        }
        .product-card .info .stock.available {
            color: #28a745;
        }
        .product-card .info .stock.out {
            color: #dc3545;
        }
        .add-btn {
            width: 100%;
            padding: 0.5rem;
            border: none;
            background: linear-gradient(135deg, var(--sky-blue), var(--green-light));
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .add-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
        }
        .add-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .fav-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: var(--transition);
            color: #ccc;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fav-btn.active {
            color: #dc3545;
        }
        .fav-btn:hover {
            transform: scale(1.1);
        }

        .spinner {
            display: none;
            text-align: center;
            padding: 1rem;
            color: var(--sky-blue);
        }
        .spinner.show {
            display: block;
        }
        .spinner i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .footer {
            background: var(--dark-bg);
            color: white;
            padding: 1.5rem 5%;
            text-align: center;
            font-size: 0.85rem;
            margin-top: 2rem;
        }

        @media (min-width: 600px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1.2rem;
            }
            .product-card img {
                height: 200px;
            }
            .product-card .info h3 {
                font-size: 1rem;
            }
            .container {
                padding: 1.5rem 5%;
            }
        }
        @media (min-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.5rem;
            }
        }
        @media (max-width: 400px) {
            .products-grid {
                grid-template-columns: 1fr 1fr;
                gap: 0.6rem;
            }
            .product-card img {
                height: 120px;
            }
            .product-card .info h3 {
                font-size: 0.75rem;
            }
            .product-card .info .price {
                font-size: 0.95rem;
            }
            .add-btn {
                font-size: 0.75rem;
                padding: 0.4rem;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="https://i.servimg.com/u/f54/18/11/62/61/tm/picsar12.png" alt="أولاد شعلان" class="logo-img">
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="store.html"><i class="fas fa-store"></i> المتجر</a>
            <a href="how-to-use.html"><i class="fas fa-book-open"></i> كيفية الاستخدام</a>
            <a href="track-order.html"><i class="fas fa-truck-fast"></i> تتبع الطلب</a>
            <div class="cart-icon" onclick="goToCheckout()">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <div class="container">

        <!-- ===== شريط البحث ===== -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج..." onkeyup="filterProducts()">
            <select id="sortSelect" onchange="filterProducts()">
                <option value="newest">الأحدث</option>
                <option value="price-asc">السعر: من الأقل للأعلى</option>
                <option value="price-desc">السعر: من الأعلى للأقل</option>
            </select>
        </div>

        <!-- ===== التصنيفات ===== -->
        <div class="categories-bar" id="categoriesBar">
            <button class="cat-btn active" data-cat="all" onclick="filterByCategory('all')">📌 الكل</button>
            <div class="spinner" id="catSpinner"><i class="fas fa-spinner"></i></div>
        </div>

        <!-- ===== البراندات ===== -->
        <div class="brands-row" id="brandsRow">
            <span class="label"><i class="fas fa-building"></i> البراندات:</span>
            <span style="color:#999;font-size:0.8rem;">جاري التحميل...</span>
        </div>

        <!-- ===== المنتجات ===== -->
        <div class="spinner" id="productsSpinner"><i class="fas fa-spinner"></i> جاري تحميل المنتجات...</div>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <footer class="footer">
        <p>© 2026 متجر أولاد شعلان - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
            authDomain: "awlad-sh3lan-store.firebaseapp.com",
            projectId: "awlad-sh3lan-store",
            storageBucket: "awlad-sh3lan-store.firebasestorage.app",
            messagingSenderId: "77191704198",
            appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allProducts = [];
        let allCategories = [];
        let allBrands = [];
        let currentCategory = 'all';
        let currentBrand = null;
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

        // ===== تحديث عداد السلة =====
        function updateCartCount() {
            document.getElementById('cartCount').innerText = cart.reduce((s, i) => s + i.quantity, 0);
        }

        function goToCheckout() {
            if (cart.length === 0) { alert('السلة فارغة'); return; }
            localStorage.setItem('cart', JSON.stringify(cart));
            window.location.href = 'checkout.html';
        }

        // ===== تحميل البيانات =====
        async function loadData() {
            try {
                // تحميل المنتجات
                const productsSnap = await db.collection('products').get();
                allProducts = productsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                // تحميل التصنيفات
                const catSnap = await db.collection('categories').get();
                allCategories = catSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderCategories();

                // تحميل البراندات
                const brandSnap = await db.collection('brands').get();
                allBrands = brandSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderBrands('all');

                filterProducts();
                updateCartCount();
            } catch (error) {
                console.error('خطأ في تحميل البيانات:', error);
            }
        }

        // ===== عرض التصنيفات =====
        function renderCategories() {
            const bar = document.getElementById('categoriesBar');
            const buttons = allCategories.map(c =>
                `<button class="cat-btn" data-cat="${c.id}" onclick="filterByCategory('${c.id}')">${c.name}</button>`
            ).join('');
            bar.innerHTML = `<button class="cat-btn active" data-cat="all" onclick="filterByCategory('all')">📌 الكل</button> ${buttons}`;
        }

        // ===== عرض البراندات (حسب التصنيف المختار) =====
        function renderBrands(categoryId) {
            const row = document.getElementById('brandsRow');

            // فلترة البراندات حسب التصنيف
            let filteredBrands = allBrands;
            if (categoryId !== 'all') {
                // جلب المنتجات في هذا التصنيف
                const productsInCategory = allProducts.filter(p => p.categoryId === categoryId);
                const brandIds = new Set(productsInCategory.map(p => p.brandId).filter(Boolean));
                filteredBrands = allBrands.filter(b => brandIds.has(b.id));
            }

            if (filteredBrands.length === 0) {
                row.innerHTML = `
                    <span class="label"><i class="fas fa-building"></i> البراندات:</span>
                    <span style="color:#999;font-size:0.8rem;">لا توجد براندات في هذا التصنيف</span>
                `;
                return;
            }

            row.innerHTML = `
                <span class="label"><i class="fas fa-building"></i> البراندات:</span>
                ${filteredBrands.map(b => `
                    <div class="brand-item" data-brand="${b.id}" onclick="filterByBrand('${b.id}')">
                        ${b.imageUrl ? `<img src="${b.imageUrl}" alt="${b.name}">` : '<i class="fas fa-store"></i>'}
                        <span>${b.name}</span>
                    </div>
                `).join('')}
            `;
        }

        // ===== فلترة حسب التصنيف =====
        function filterByCategory(catId) {
            currentCategory = catId;
            currentBrand = null;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === catId));
            document.querySelectorAll('.brand-item').forEach(b => b.classList.remove('active'));
            renderBrands(catId);
            filterProducts();
        }

        // ===== فلترة حسب البراند =====
        function filterByBrand(brandId) {
            currentBrand = brandId;
            document.querySelectorAll('.brand-item').forEach(b => b.classList.toggle('active', b.dataset.brand === brandId));
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.cat-btn[data-cat="all"]').classList.add('active');
            currentCategory = 'all';
            filterProducts();
        }

        // ===== فلترة وبحث =====
        function filterProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const sort = document.getElementById('sortSelect').value;

            let filtered = allProducts;

            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.categoryId === currentCategory);
            }
            if (currentBrand) {
                filtered = filtered.filter(p => p.brandId === currentBrand);
            }
            if (search) {
                filtered = filtered.filter(p => (p.name || '').toLowerCase().includes(search));
            }

            // ترتيب
            if (sort === 'price-asc') {
                filtered.sort((a, b) => (a.discountPrice || a.price) - (b.discountPrice || b.price));
            } else if (sort === 'price-desc') {
                filtered.sort((a, b) => (b.discountPrice || b.price) - (a.discountPrice || a.price));
            } else {
                filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }

            renderProducts(filtered);
        }

        // ===== عرض المنتجات =====
        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');
            const spinner = document.getElementById('productsSpinner');
            spinner.classList.remove('show');

            if (products.length === 0) {
                grid.innerHTML =
                    `<p style="text-align:center;width:100%;color:#999;padding:2rem;">لا توجد منتجات مطابقة للبحث</p>`;
                return;
            }

            grid.innerHTML = products.map(p => {
                const isFav = favorites.includes(p.id);
                const price = p.discountPrice || p.price;
                const isOut = p.stock <= 0;
                return `
                    <div class="product-card">
                        <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${p.id}')">
                            <i class="fas fa-heart"></i>
                        </button>
                        <img src="${p.images && p.images[0] ? p.images[0] : 'https://via.placeholder.com/200'}" alt="${p.name || 'منتج'}">
                        <div class="info">
                            <h3>${p.name || 'منتج'}</h3>
                            <div>
                                <span class="price">${price} ج</span>
                                ${p.discountPrice ? `<span class="old-price">${p.price}</span>` : ''}
                            </div>
                            <div class="stock ${isOut ? 'out' : 'available'}">
                                ${isOut ? '❌ غير متوفر' : `✅ متوفر (${p.stock})`}
                            </div>
                        </div>
                        <button class="add-btn" onclick="addToCart('${p.id}')" ${isOut ? 'disabled' : ''}>
                            <i class="fas fa-cart-plus"></i> ${isOut ? 'غير متوفر' : 'أضف للسلة'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        // ===== إضافة للسلة =====
        function addToCart(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product || product.stock <= 0) return;
            const existing = cart.find(i => i.id === productId);
            if (existing) {
                if (existing.quantity >= product.stock) {
                    alert('⚠️ الكمية المطلوبة تتجاوز المخزون المتاح');
                    return;
                }
                existing.quantity++;
            } else {
                cart.push({ id: productId, name: product.name, price: product.discountPrice || product.price,
                    quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
        }

        // ===== المفضلة =====
        function toggleFavorite(productId) {
            const index = favorites.indexOf(productId);
            if (index > -1) favorites.splice(index, 1);
            else favorites.push(productId);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            filterProducts();
        }

        // ===== التحميل =====
        loadData();

        window.filterByCategory = filterByCategory;
        window.filterByBrand = filterByBrand;
        window.filterProducts = filterProducts;
        window.addToCart = addToCart;
        window.toggleFavorite = toggleFavorite;
        window.goToCheckout = goToCheckout;
    </script>

</body>
</html>
