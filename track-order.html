<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع طلبك | متجر أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8edf2 100%);
            min-height: 100vh;
        }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --green-light: #90E0EF;
            --dark-bg: #1a2a3a;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header {
            background: var(--dark-bg);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--gold-light); }
        .logo span { color: var(--sky-blue); }
        .nav-links a { color: white; text-decoration: none; margin-right: 1.5rem; }
        .container { padding: 3rem 5%; max-width: 800px; margin: 0 auto; }
        .track-card {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            box-shadow: var(--shadow);
            text-align: center;
        }
        h1 { color: var(--dark-bg); margin-bottom: 0.5rem; }
        .subtitle { color: #666; margin-bottom: 2rem; }
        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 1rem;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-family: inherit;
            font-size: 1rem;
            text-align: center;
        }
        .search-box button {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--sky-blue), var(--green-light));
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .order-result {
            display: none;
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f9f9f9;
            border-radius: 20px;
            text-align: right;
        }
        .status-timeline {
            display: flex;
            justify-content: space-between;
            margin: 2rem 0;
            flex-wrap: wrap;
            position: relative;
        }
        .timeline-step {
            text-align: center;
            flex: 1;
            min-width: 80px;
            position: relative;
            z-index: 1;
        }
        .step-circle {
            width: 40px;
            height: 40px;
            background: #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.5rem;
            color: white;
        }
        .step-circle.completed { background: var(--gold-dark); }
        .step-circle.active { background: var(--sky-blue); box-shadow: 0 0 0 3px var(--gold-light); }
        .step-label { font-size: 0.8rem; color: #666; }
        .step-label.completed { color: var(--gold-dark); font-weight: bold; }
        .order-info { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #ddd; }
        .error-msg { color: red; margin-top: 1rem; }
        .footer {
            background: var(--dark-bg);
            color: white;
            padding: 2rem 5%;
            text-align: center;
            margin-top: 3rem;
        }
        @media (max-width: 768px) {
            .timeline-step { min-width: 60px; }
            .step-label { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">أولاد <span>شعلان</span></div>
    <div class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="track-order.html">تتبع طلبك</a>
        <a href="price-list.html">عرض الأسعار</a>
    </div>
</header>

<div class="container">
    <div class="track-card">
        <h1><i class="fas fa-search"></i> تتبع طلبك</h1>
        <p class="subtitle">أدخل رقم التتبع الخاص بك لمتابعة حالة الطلب</p>
        
        <div class="search-box">
            <input type="text" id="trackingCode" placeholder="مثال: ORD-XXXXXX" autocomplete="off">
            <button onclick="trackOrder()"><i class="fas fa-search"></i> تتبع</button>
        </div>
        
        <div id="orderResult" class="order-result">
            <h3 id="orderStatusTitle"></h3>
            <div class="status-timeline" id="timeline"></div>
            <div class="order-info" id="orderInfo"></div>
        </div>
        <div id="errorMsg" class="error-msg"></div>
    </div>
</div>

<footer class="footer">
    <p>© 2026 متجر أولاد شعلان - جميع الحقوق محفوظة</p>
</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
        authDomain: "awlad-sh3lan-store.firebaseapp.com",
        projectId: "awlad-sh3lan-store",
        storageBucket: "awlad-sh3lan-store.firebasestorage.app",
        messagingSenderId: "77191704198",
        appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    const statusSteps = [
        { key: 'قيد المراجعة', label: 'قيد المراجعة', icon: 'fa-clock' },
        { key: 'تم التأكيد', label: 'تم التأكيد', icon: 'fa-check-circle' },
        { key: 'جاري التجهيز', label: 'جاري التجهيز', icon: 'fa-box' },
        { key: 'تم الشحن', label: 'تم الشحن', icon: 'fa-truck' },
        { key: 'تم التوصيل', label: 'تم التوصيل', icon: 'fa-home' }
    ];
    
    async function trackOrder() {
        const trackingCode = document.getElementById('trackingCode').value.trim();
        const resultDiv = document.getElementById('orderResult');
        const errorDiv = document.getElementById('errorMsg');
        
        if (!trackingCode) {
            errorDiv.innerText = 'الرجاء إدخال رقم التتبع';
            resultDiv.style.display = 'none';
            return;
        }
        
        errorDiv.innerText = '';
        
        const snapshot = await db.collection('orders').where('trackingCode', '==', trackingCode).get();
        
        if (snapshot.empty) {
            errorDiv.innerText = 'لم يتم العثور على طلب بهذا الرقم';
            resultDiv.style.display = 'none';
            return;
        }
        
        const order = snapshot.docs[0].data();
        const currentStatus = order.status || 'قيد المراجعة';
        const currentStepIndex = statusSteps.findIndex(s => s.key === currentStatus);
        
        // عرض الحالة
        document.getElementById('orderStatusTitle').innerHTML = `
            <i class="fas ${statusSteps[currentStepIndex]?.icon || 'fa-info-circle'}"></i>
            حالة الطلب: ${currentStatus}
        `;
        
        // عرض التايملاين
        const timeline = document.getElementById('timeline');
        timeline.innerHTML = statusSteps.map((step, index) => {
            let stepClass = '';
            if (index < currentStepIndex) stepClass = 'completed';
            else if (index === currentStepIndex) stepClass = 'active';
            
            return `
                <div class="timeline-step">
                    <div class="step-circle ${stepClass}">
                        <i class="fas ${step.icon}"></i>
                    </div>
                    <div class="step-label ${stepClass}">${step.label}</div>
                </div>
            `;
        }).join('');
        
        // عرض معلومات الطلب
        document.getElementById('orderInfo').innerHTML = `
            <p><strong><i class="fas fa-user"></i> العميل:</strong> ${order.customerName || '-'}</p>
            <p><strong><i class="fas fa-phone"></i> الهاتف:</strong> ${order.phone || '-'}</p>
            <p><strong><i class="fas fa-map-marker-alt"></i> العنوان:</strong> ${order.address || '-'}</p>
            <p><strong><i class="fas fa-money-bill"></i> طريقة الدفع:</strong> ${order.paymentMethod || '-'}</p>
            <p><strong><i class="fas fa-calendar"></i> تاريخ الطلب:</strong> ${order.createdAt ? new Date(order.createdAt).toLocaleString('ar') : '-'}</p>
            <p><strong><i class="fas fa-tag"></i> كود التتبع:</strong> ${trackingCode}</p>
        `;
        
        resultDiv.style.display = 'block';
    }
    
    // السماح بالضغط على Enter
    document.getElementById('trackingCode').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') trackOrder();
    });
</script>

</body>
</html>
