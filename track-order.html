<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع الطلب | أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; min-height: 100vh; }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --green-light: #90E0EF;
            --dark-bg: #1a2a3a;
            --shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .header {
            background: var(--dark-bg);
            color: white;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-img { height: 40px; width: auto; max-width: 140px; object-fit: contain; }
        .nav-links { display: flex; gap: 1.2rem; flex-wrap: wrap; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: all 0.3s; }
        .nav-links a:hover { color: var(--gold-light); }

        .container { padding: 2rem 5%; max-width: 700px; margin: 0 auto; }
        .track-card { background: white; border-radius: 25px; padding: 2rem; box-shadow: var(--shadow); text-align: center; }
        .track-card h1 { color: var(--gold-dark); font-size: 1.8rem; }
        .track-card .sub { color: #666; margin-bottom: 1.5rem; }
        .search-box { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
        .search-box input { flex: 1; min-width: 200px; padding: 0.8rem 1.5rem; border: 2px solid #ddd; border-radius: 50px; font-family: inherit; font-size: 1rem; text-align: center; }
        .search-box input:focus { border-color: var(--sky-blue); outline: none; }
        .search-box button { padding: 0.8rem 2rem; background: linear-gradient(135deg, var(--sky-blue), var(--green-light)); border: none; border-radius: 50px; color: white; font-weight: 700; cursor: pointer; }
        .result { display: none; margin-top: 1.5rem; text-align: right; }
        .result .status-title { font-size: 1.2rem; font-weight: 700; color: var(--gold-dark); margin-bottom: 1rem; }
        .timeline { display: flex; justify-content: space-between; flex-wrap: wrap; margin: 1.5rem 0; position: relative; }
        .step { text-align: center; flex: 1; min-width: 60px; }
        .step .circle { width: 35px; height: 35px; border-radius: 50%; background: #ddd; margin: 0 auto 0.3rem; display: flex; align-items: center; justify-content: center; color: white; }
        .step .circle.completed { background: var(--gold-dark); }
        .step .circle.active { background: var(--sky-blue); box-shadow: 0 0 0 3px var(--gold-light); }
        .step .label { font-size: 0.7rem; color: #888; }
        .step .label.completed { color: var(--gold-dark); font-weight: 700; }
        .info { background: #f9f9f9; padding: 1rem; border-radius: 15px; margin-top: 1rem; }
        .info p { margin: 0.3rem 0; font-size: 0.95rem; }
        .error { color: #dc3545; margin-top: 1rem; }

        .footer { background: var(--dark-bg); color: white; padding: 2rem 5%; text-align: center; margin-top: 3rem; }

        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .search-box { flex-direction: column; }
            .timeline { gap: 0.3rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <img src="https://i.servimg.com/u/f54/18/11/62/61/tm/picsar12.png" alt="أولاد شعلان" class="logo-img">
    <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
        <a href="store.html"><i class="fas fa-store"></i> المتجر</a>
        <a href="track-order.html"><i class="fas fa-truck-fast"></i> تتبع الطلب</a>
    </div>
</header>

<div class="container">
    <div class="track-card">
        <h1><i class="fas fa-search"></i> تتبع طلبك</h1>
        <p class="sub">أدخل رقم التتبع لمتابعة حالة طلبك</p>

        <div class="search-box">
            <input type="text" id="trackingInput" placeholder="مثال: ORD-XXXXXX" autocomplete="off">
            <button onclick="trackOrder()"><i class="fas fa-search"></i> تتبع</button>
        </div>

        <div id="errorMsg" class="error"></div>

        <div id="result" class="result">
            <div class="status-title" id="statusTitle"></div>
            <div class="timeline" id="timelineContainer"></div>
            <div class="info" id="infoContainer"></div>
        </div>
    </div>
</div>

<footer class="footer">
    <p>© 2026 متجر أولاد شعلان - جميع الحقوق محفوظة</p>
</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
        authDomain: "awlad-sh3lan-store.firebaseapp.com",
        projectId: "awlad-sh3lan-store",
        storageBucket: "awlad-sh3lan-store.firebasestorage.app",
        messagingSenderId: "77191704198",
        appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const steps = [
        { key: 'قيد المراجعة', label: 'قيد المراجعة', icon: 'fa-clock' },
        { key: 'تم التأكيد', label: 'تم التأكيد', icon: 'fa-check-circle' },
        { key: 'جاري التجهيز', label: 'جاري التجهيز', icon: 'fa-box' },
        { key: 'تم الشحن', label: 'تم الشحن', icon: 'fa-truck' },
        { key: 'تم التوصيل', label: 'تم التوصيل', icon: 'fa-home' }
    ];

    async function trackOrder() {
        const code = document.getElementById('trackingInput').value.trim();
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('errorMsg');

        if (!code) {
            errorDiv.innerText = '⚠️ الرجاء إدخال رقم التتبع';
            resultDiv.style.display = 'none';
            return;
        }

        errorDiv.innerText = '';
        resultDiv.style.display = 'none';

        const snapshot = await db.collection('orders').where('trackingCode', '==', code).get();

        if (snapshot.empty) {
            errorDiv.innerText = '❌ لم يتم العثور على طلب بهذا الرقم';
            return;
        }

        const order = snapshot.docs[0].data();
        const status = order.status || 'قيد المراجعة';
        const idx = steps.findIndex(s => s.key === status);

        // الحالة
        document.getElementById('statusTitle').innerHTML = `
            <i class="fas ${steps[idx]?.icon || 'fa-info-circle'}"></i>
            حالة الطلب: <span style="color:var(--sky-blue);">${status}</span>
        `;

        // التايملاين
        document.getElementById('timelineContainer').innerHTML = steps.map((s, i) => {
            let cls = '';
            if (i < idx) cls = 'completed';
            else if (i === idx) cls = 'active';
            return `
                <div class="step">
                    <div class="circle ${cls}"><i class="fas ${s.icon}"></i></div>
                    <div class="label ${cls}">${s.label}</div>
                </div>
            `;
        }).join('');

        // المعلومات
        document.getElementById('infoContainer').innerHTML = `
            <p><strong>رقم التتبع:</strong> ${code}</p>
            <p><strong>العميل:</strong> ${order.customerName || '-'}</p>
            <p><strong>الهاتف:</strong> ${order.phone || '-'}</p>
            <p><strong>العنوان:</strong> ${order.address || '-'}</p>
            <p><strong>تاريخ الطلب:</strong> ${order.createdAt ? new Date(order.createdAt).toLocaleString('ar') : '-'}</p>
            <p><strong>الإجمالي:</strong> ${order.totalAmount || 0} جنيه</p>
        `;

        resultDiv.style.display = 'block';
    }

    document.getElementById('trackingInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') trackOrder();
    });

    window.trackOrder = trackOrder;
</script>

</body>
</html>
