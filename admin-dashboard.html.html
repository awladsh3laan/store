<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - متجر أولاد شعلان</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Style -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* استايلات إضافية للداشبورد */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        
        .stat-info h3 {
            font-size: 14px;
            color: var(--gray-text);
            margin-bottom: 10px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-dark);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            background: var(--primary-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
        }
        
        .chart-card h3 {
            margin-bottom: 20px;
            color: var(--primary-dark);
            text-align: center;
        }
        
        .recent-orders {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
        }
        
        .recent-orders h3 {
            margin-bottom: 20px;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        
        .quick-btn {
            background: var(--light-bg);
            padding: 15px;
            text-align: center;
            border-radius: 15px;
            text-decoration: none;
            color: var(--primary-dark);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .quick-btn:hover {
            background: var(--primary-blue);
            color: white;
            transform: translateY(-3px);
        }
        
        .admin-header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }
        
        .admin-header h1 {
            font-size: 24px;
            color: var(--primary-dark);
        }
        
        .logout-btn {
            background: var(--danger-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .welcome-text {
            font-size: 14px;
            color: var(--gray-text);
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div>
            <h1><i class="fas fa-store"></i> متجر أولاد شعلان</h1>
            <div class="welcome-text" id="welcomeText">مرحباً بك في لوحة التحكم</div>
        </div>
        <button class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> تسجيل خروج
        </button>
    </div>
    
    <div class="admin-content">
        <div class="container">
            <!-- إحصائيات -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <h3><i class="fas fa-box"></i> إجمالي المنتجات</h3>
                        <div class="stat-number" id="totalProducts">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-box"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3><i class="fas fa-shopping-cart"></i> إجمالي الطلبات</h3>
                        <div class="stat-number" id="totalOrders">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-shopping-cart"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3><i class="fas fa-money-bill-wave"></i> إجمالي الإيرادات</h3>
                        <div class="stat-number" id="totalRevenue">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-info">
                        <h3><i class="fas fa-clock"></i> طلبات معلقة</h3>
                        <div class="stat-number" id="pendingOrders">0</div>
                    </div>
                    <div class="stat-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                </div>
            </div>
            
            <!-- الرسوم البيانية -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3><i class="fas fa-chart-line"></i> الطلبات الشهرية</h3>
                    <canvas id="ordersChart"></canvas>
                </div>
                
                <div class="chart-card">
                    <h3><i class="fas fa-chart-pie"></i> توزيع الطلبات</h3>
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
            
            <!-- أحدث الطلبات -->
            <div class="recent-orders">
                <h3><i class="fas fa-clock"></i> أحدث الطلبات</h3>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>رقم الطلب</th>
                                <th>العميل</th>
                                <th>الهاتف</th>
                                <th>الإجمالي</th>
                                <th>الحالة</th>
                                <th>التاريخ</th>
                                <th>إجراء</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrdersList">
                            <tr>
                                <td colspan="7" style="text-align: center;">جاري التحميل...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- أزرار سريعة -->
            <div class="quick-actions">
                <a href="admin-products.html" class="quick-btn">
                    <i class="fas fa-plus-circle"></i> إدارة المنتجات
                </a>
                <a href="admin-slider.html" class="quick-btn">
                    <i class="fas fa-images"></i> إدارة السلايدر
                </a>
                <a href="admin-shipping.html" class="quick-btn">
                    <i class="fas fa-truck"></i> إعدادات الشحن
                </a>
                <a href="admin-orders.html" class="quick-btn">
                    <i class="fas fa-list"></i> كل الطلبات
                </a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>

    <!-- Firebase Config -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
            authDomain: "awlad-sh3lan-store.firebaseapp.com",
            projectId: "awlad-sh3lan-store",
            storageBucket: "awlad-sh3lan-store.firebasestorage.app",
            messagingSenderId: "77191704198",
            appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
    </script>

    <!-- Dashboard Script -->
    <script>
        let ordersChart, statusChart;
        
        // التحقق من صلاحية الأدمن
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'admin-login.html';
                return;
            }
            
            const adminDoc = await db.collection('admins').doc(user.uid).get();
            if (!adminDoc.exists) {
                await auth.signOut();
                window.location.href = 'admin-login.html';
                return;
            }
            
            // عرض البريد الإلكتروني
            document.getElementById('welcomeText').innerHTML = `<i class="fas fa-user-shield"></i> مرحباً ${user.email}`;
            
            // تحميل البيانات
            loadDashboardData();
        });
        
        // تحميل بيانات الداشبورد
        async function loadDashboardData() {
            try {
                // جلب المنتجات
                const productsSnapshot = await db.collection('products').get();
                document.getElementById('totalProducts').textContent = productsSnapshot.size;
                
                // جلب الطلبات
                const ordersSnapshot = await db.collection('orders').orderBy('createdAt', 'desc').get();
                const orders = [];
                let totalRevenue = 0;
                let pendingCount = 0;
                
                ordersSnapshot.forEach(doc => {
                    const order = { id: doc.id, ...doc.data() };
                    orders.push(order);
                    totalRevenue += order.total || 0;
                    if (order.status === 'pending') pendingCount++;
                });
                
                document.getElementById('totalOrders').textContent = orders.length;
                document.getElementById('totalRevenue').textContent = totalRevenue.toLocaleString() + ' ج.م';
                document.getElementById('pendingOrders').textContent = pendingCount;
                
                // عرض أحدث 5 طلبات
                displayRecentOrders(orders.slice(0, 5));
                
                // تحضير بيانات الرسوم البيانية
                prepareCharts(orders);
                
            } catch (error) {
                console.error('خطأ في تحميل البيانات:', error);
            }
        }
        
        // عرض أحدث الطلبات
        function displayRecentOrders(orders) {
            const tbody = document.getElementById('recentOrdersList');
            
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">لا توجد طلبات</td></tr>';
                return;
            }
            
            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td>#${order.id.slice(0, 8)}</td>
                    <td>${order.customerName || 'غير معروف'}</td>
                    <td>${order.phone || '-'}</td>
                    <td>${(order.total || 0).toLocaleString()} ج.م</td>
                    <td>${getStatusBadge(order.status)}</td>
                    <td>${formatDate(order.createdAt)}</td>
                    <td>
                        <a href="admin-orders.html" style="color: var(--primary-blue);">
                            <i class="fas fa-eye"></i>
                        </a>
                    </td>
                </tr>
            `).join('');
        }
        
        function getStatusBadge(status) {
            const badges = {
                'pending': '<span class="status status-pending"><i class="fas fa-clock"></i> قيد المراجعة</span>',
                'confirmed': '<span class="status status-confirmed"><i class="fas fa-check"></i> تم التأكيد</span>',
                'shipped': '<span class="status status-shipped"><i class="fas fa-truck"></i> تم الشحن</span>',
                'delivered': '<span class="status status-delivered"><i class="fas fa-check-circle"></i> تم التوصيل</span>',
                'cancelled': '<span class="status status-cancelled"><i class="fas fa-times"></i> ملغي</span>'
            };
            return badges[status] || '<span class="status status-pending">غير معروف</span>';
        }
        
        function formatDate(timestamp) {
            if (!timestamp) return '-';
            const date = timestamp.toDate();
            return `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
        }
        
        // تحضير الرسوم البيانية
        function prepareCharts(orders) {
            // إحصائيات الطلبات الشهرية (آخر 6 أشهر)
            const months = [];
            const monthlyCounts = [];
            const now = new Date();
            
            for (let i = 5; i >= 0; i--) {
                const month = new Date(now.getFullYear(), now.getMonth() - i, 1);
                const monthName = month.toLocaleString('ar', { month: 'short' });
                months.push(monthName);
                
                const count = orders.filter(order => {
                    if (!order.createdAt) return false;
                    const orderDate = order.createdAt.toDate();
                    return orderDate.getMonth() === month.getMonth() && 
                           orderDate.getFullYear() === month.getFullYear();
                }).length;
                monthlyCounts.push(count);
            }
            
            // رسم مخطط الطلبات الشهرية
            if (ordersChart) ordersChart.destroy();
            ordersChart = new Chart(document.getElementById('ordersChart'), {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'عدد الطلبات',
                        data: monthlyCounts,
                        borderColor: '#00B4D8',
                        backgroundColor: 'rgba(0, 180, 216, 0.1)',
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
            
            // إحصائيات حالة الطلبات
            const statuses = {
                pending: orders.filter(o => o.status === 'pending').length,
                confirmed: orders.filter(o => o.status === 'confirmed').length,
                shipped: orders.filter(o => o.status === 'shipped').length,
                delivered: orders.filter(o => o.status === 'delivered').length,
                cancelled: orders.filter(o => o.status === 'cancelled').length
            };
            
            if (statusChart) statusChart.destroy();
            statusChart = new Chart(document.getElementById('statusChart'), {
                type: 'pie',
                data: {
                    labels: ['قيد المراجعة', 'تم التأكيد', 'تم الشحن', 'تم التوصيل', 'ملغي'],
                    datasets: [{
                        data: [statuses.pending, statuses.confirmed, statuses.shipped, statuses.delivered, statuses.cancelled],
                        backgroundColor: ['#F39C12', '#00B4D8', '#DAA520', '#2ECC71', '#E74C3C']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }
        
        // تسجيل الخروج
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await auth.signOut();
            window.location.href = 'admin-login.html';
        });
    </script>
</body>
</html>
