<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أولاد شعلان - الرئيسية</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <!-- Style -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* استايلات إضافية للصفحة الرئيسية */
        .hero-slider {
            position: relative;
            height: 400px;
            overflow: hidden;
            border-radius: 20px;
            margin-bottom: 40px;
        }
        
        .slider-container {
            position: relative;
            height: 100%;
        }
        
        .slider-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
            background-size: cover;
            background-position: center;
        }
        
        .slider-slide.active {
            opacity: 1;
        }
        
        .slider-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .slider-overlay h3 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }
        
        .slider-btn.prev { left: 20px; }
        .slider-btn.next { right: 20px; }
        
        .slider-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        
        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            cursor: pointer;
        }
        
        .dot.active {
            background: var(--secondary-gold);
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: var(--primary-dark);
        }
        
        .section-title i {
            color: var(--secondary-gold);
            margin-left: 10px;
        }
        
        /* سلة التسوق الجانبية */
        .cart-sidebar {
            position: fixed;
            top: 0;
            left: -400px;
            width: 380px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            z-index: 2000;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .cart-sidebar.open {
            left: 0;
        }
        
        .cart-header {
            padding: 20px;
            background: var(--primary-dark);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #EEE;
        }
        
        .cart-item-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .cart-item-info {
            flex: 1;
        }
        
        .cart-item-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .cart-item-price {
            color: var(--success-green);
        }
        
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }
        
        .cart-item-quantity button {
            background: var(--light-bg);
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .cart-footer {
            padding: 20px;
            border-top: 2px solid #EEE;
        }
        
        .cart-total {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .checkout-btn {
            width: 100%;
            background: var(--success-green);
            color: white;
        }
        
        .cart-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
        }
        
        .cart-overlay.open {
            display: block;
        }
        
        .cart-icon {
            position: relative;
            cursor: pointer;
        }
        
        /* نافذة إنهاء الطلب */
        .checkout-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2001;
            justify-content: center;
            align-items: center;
        }
        
        .checkout-container {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
        }
        
        .payment-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        
        .payment-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .payment-option.selected {
            border-color: var(--success-green);
            background: #F0FFF0;
        }
        
        .payment-option i {
            font-size: 24px;
        }
        
        .shipping-number {
            background: var(--light-bg);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 15px 0;
            direction: ltr;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="logo">
                <i class="fas fa-store"></i>
                <span>متجر أولاد شعلان</span>
            </div>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="price-list.html"><i class="fas fa-file-invoice-dollar"></i> قائمة الأسعار</a>
                <a href="track-order.html"><i class="fas fa-search"></i> تتبع الطلب</a>
                <a class="cart-icon" id="cartIcon">
                    <i class="fas fa-shopping-cart"></i> السلة
                    <span class="cart-count" id="cartCount">0</span>
                </a>
            </div>
        </div>
    </header>
    
    <main class="container">
        <!-- Hero Slider -->
        <div class="hero-slider">
            <div class="slider-container" id="sliderContainer">
                <button class="slider-btn prev" id="prevSlide"><i class="fas fa-chevron-right"></i></button>
                <button class="slider-btn next" id="nextSlide"><i class="fas fa-chevron-left"></i></button>
                <div class="slider-dots" id="sliderDots"></div>
            </div>
        </div>
        
        <!-- Products Section -->
        <h2 class="section-title">
            <i class="fas fa-box-open"></i> منتجاتنا
        </h2>
        <div class="products-grid" id="productsGrid">
            <div style="text-align: center; grid-column: 1/-1;">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p>جاري تحميل المنتجات...</p>
            </div>
        </div>
    </main>
    
    <footer class="main-footer">
        <div class="container">
            <p><i class="fas fa-copyright"></i> 2024 متجر أولاد شعلان - جميع الحقوق محفوظة</p>
            <p style="margin-top: 10px; font-size: 14px;">
                <i class="fas fa-phone"></i> للتواصل: 01012345678
            </p>
        </div>
    </footer>
    
    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> سلة التسوق</h3>
            <button id="closeCartBtn" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">&times;</button>
        </div>
        <div class="cart-items" id="cartItemsList">
            <p style="text-align: center;">السلة فارغة</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">الإجمالي: <span id="cartTotal">0</span> ج.م</div>
            <button class="btn btn-primary checkout-btn" id="checkoutBtn">
                <i class="fas fa-credit-card"></i> إنهاء الطلب
            </button>
        </div>
    </div>
    
    <!-- Checkout Modal -->
    <div class="checkout-modal" id="checkoutModal">
        <div class="checkout-container">
            <div class="form-header">
                <h3><i class="fas fa-clipboard-list"></i> إنهاء الطلب</h3>
                <button class="close-form" id="closeCheckoutBtn">&times;</button>
            </div>
            <form id="checkoutForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> الاسم بالكامل</label>
                    <input type="text" id="customerName" required placeholder="أدخل اسمك الثلاثي">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> رقم الهاتف</label>
                    <input type="tel" id="customerPhone" required placeholder="01xxxxxxxxx" maxlength="11">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> العنوان بالتفصيل</label>
                    <textarea id="customerAddress" rows="3" required placeholder="المحافظة - المدينة - الحي - الشارع - رقم العمارة"></textarea>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-money-bill-wave"></i> طريقة الدفع</label>
                    <div class="payment-options" id="paymentOptions">
                        <div class="payment-option" data-method="instapay">
                            <i class="fas fa-building-columns" style="color: #0066B3;"></i>
                            <span>إنستاباي - 01063835028</span>
                        </div>
                        <div class="payment-option" data-method="vodafone">
                            <i class="fas fa-mobile-alt" style="color: #E60000;"></i>
                            <span>فودافون كاش - 01068385028</span>
                        </div>
                        <div class="payment-option" data-method="orange">
                            <i class="fas fa-wifi" style="color: #FF6600;"></i>
                            <span>إي أند كاش - 01120282953</span>
                        </div>
                    </div>
                </div>
                <div id="shippingInfo" class="shipping-number"></div>
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-check-circle"></i> تأكيد الطلب
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>

    <!-- Firebase Config -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
            authDomain: "awlad-sh3lan-store.firebaseapp.com",
            projectId: "awlad-sh3lan-store",
            storageBucket: "awlad-sh3lan-store.firebasestorage.app",
            messagingSenderId: "77191704198",
            appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
    </script>

    <!-- Main Script -->
    <script>
        let cart = [];
        let products = [];
        let sliders = [];
        let currentSlide = 0;
        let shippingNumber = '';
        let selectedPayment = 'instapay';
        
        // تحميل البيانات
        async function loadData() {
            await Promise.all([
                loadProducts(),
                loadSliders(),
                loadShippingNumber()
            ]);
        }
        
        async function loadProducts() {
            try {
                const snapshot = await db.collection('products').orderBy('createdAt', 'desc').get();
                products = [];
                snapshot.forEach(doc => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                displayProducts();
            } catch (error) {
                console.error('خطأ:', error);
            }
        }
        
        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            if (products.length === 0) {
                grid.innerHTML = '<div style="text-align: center; grid-column: 1/-1;">لا توجد منتجات حالياً</div>';
                return;
            }
            
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.image}" class="product-img" onerror="this.src='https://via.placeholder.com/280x200'">
                    <div class="product-info">
                        <div class="product-title">${escapeHtml(product.name)}</div>
                        <div class="product-price">${product.price.toLocaleString()} ج.م</div>
                        <p style="font-size: 14px; color: #7F8C8D; margin: 10px 0;">${product.description ? escapeHtml(product.description.substring(0, 80)) + (product.description.length > 80 ? '...' : '') : ''}</p>
                        <button class="btn btn-primary add-to-cart" data-product='${JSON.stringify(product)}' style="width: 100%;">
                            <i class="fas fa-cart-plus"></i> أضف للسلة
                        </button>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', () => {
                    const product = JSON.parse(btn.dataset.product);
                    addToCart(product);
                });
            });
        }
        
        async function loadSliders() {
            try {
                const snapshot = await db.collection('sliders').orderBy('order', 'asc').get();
                sliders = [];
                snapshot.forEach(doc => {
                    sliders.push({ id: doc.id, ...doc.data() });
                });
                initSlider();
            } catch (error) {
                console.error('خطأ في تحميل السلايدر:', error);
            }
        }
        
        function initSlider() {
            const container = document.getElementById('sliderContainer');
            if (sliders.length === 0) {
                container.innerHTML = '<div style="height:100%;background:#03045E;display:flex;align-items:center;justify-content:center;color:white;"><i class="fas fa-store fa-3x"></i></div>';
                return;
            }
            
            // بناء السلايدات
            let slidesHtml = '';
            sliders.forEach((slider, index) => {
                slidesHtml += `<div class="slider-slide ${index === 0 ? 'active' : ''}" style="background-image: url('${slider.image}')">
                    ${slider.title ? `<div class="slider-overlay"><h3>${escapeHtml(slider.title)}</h3></div>` : ''}
                </div>`;
            });
            
            container.innerHTML = slidesHtml + `
                <button class="slider-btn prev" id="prevSlide"><i class="fas fa-chevron-right"></i></button>
                <button class="slider-btn next" id="nextSlide"><i class="fas fa-chevron-left"></i></button>
                <div class="slider-dots" id="sliderDots"></div>
            `;
            
            // إضافة النقاط
            const dotsContainer = document.getElementById('sliderDots');
            dotsContainer.innerHTML = sliders.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>`).join('');
            
            // إضافة الأحداث
            document.getElementById('prevSlide').addEventListener('click', () => changeSlide(-1));
            document.getElementById('nextSlide').addEventListener('click', () => changeSlide(1));
            document.querySelectorAll('.dot').forEach(dot => {
                dot.addEventListener('click', () => changeSlide(parseInt(dot.dataset.index) - currentSlide));
            });
        }
        
        function changeSlide(direction) {
            const slides = document.querySelectorAll('.slider-slide');
            const dots = document.querySelectorAll('.dot');
            slides[currentSlide].classList.remove('active');
            dots[currentSlide]?.classList.remove('active');
            currentSlide = (currentSlide + direction + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            dots[currentSlide]?.classList.add('active');
        }
        
        async function loadShippingNumber() {
            try {
                const doc = await db.collection('settings').doc('shipping').get();
                if (doc.exists && doc.data().phoneNumber) {
                    shippingNumber = doc.data().phoneNumber;
                } else {
                    shippingNumber = '01012345678';
                }
                document.getElementById('shippingInfo').innerHTML = `<i class="fas fa-truck"></i> رقم مندوب الشحن: <strong dir="ltr">${shippingNumber}</strong>`;
            } catch (error) {
                console.error('خطأ:', error);
            }
        }
        
        // سلة التسوق
        function loadCart() {
            const saved = localStorage.getItem('ecommerce_cart');
            if (saved) cart = JSON.parse(saved);
            updateCartUI();
        }
        
        function saveCart() {
            localStorage.setItem('ecommerce_cart', JSON.stringify(cart));
            updateCartUI();
        }
        
        function addToCart(product) {
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            saveCart();
            showToast('تم إضافة المنتج للسلة', 'success');
        }
        
        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
        }
        
        function updateQuantity(id, delta) {
            const item = cart.find(item => item.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(id);
                }
                saveCart();
            }
        }
        
        function updateCartUI() {
            const count = cart.reduce((sum, i) => sum + i.quantity, 0);
            document.getElementById('cartCount').textContent = count;
            
            const container = document.getElementById('cartItemsList');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center;">السلة فارغة</p>';
                document.getElementById('cartTotal').textContent = '0';
                return;
            }
            
            let total = 0;
            container.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item">
                        <img src="${item.image}" class="cart-item-img" onerror="this.src='https://via.placeholder.com/60'">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${escapeHtml(item.name)}</div>
                            <div class="cart-item-price">${item.price.toLocaleString()} ج.م</div>
                            <div class="cart-item-quantity">
                                <button onclick="updateQuantity('${item.id}', -1)">-</button>
                                <span>${item.quantity}</span>
                                <button onclick="updateQuantity('${item.id}', 1)">+</button>
                                <button onclick="removeFromCart('${item.id}')" style="background:#E74C3C;color:white;">حذف</button>
                            </div>
                        </div>
                        <div style="font-weight:bold;">${itemTotal.toLocaleString()} ج.م</div>
                    </div>
                `;
            }).join('');
            document.getElementById('cartTotal').textContent = total.toLocaleString();
        }
        
        // إنشاء طلب
        async function createOrder(orderData) {
            try {
                orderData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                orderData.status = 'pending';
                const docRef = await db.collection('orders').add(orderData);
                cart = [];
                saveCart();
                showToast(`تم إنشاء الطلب بنجاح! رقم الطلب: ${docRef.id.slice(0,8)}`, 'success');
                document.getElementById('checkoutModal').style.display = 'none';
                document.getElementById('cartSidebar').classList.remove('open');
                document.getElementById('cartOverlay').classList.remove('open');
                return docRef.id;
            } catch (error) {
                console.error('خطأ:', error);
                showToast('حدث خطأ في إنشاء الطلب', 'error');
                return null;
            }
        }
        
        // أحداث الصفحة
        document.getElementById('cartIcon').addEventListener('click', () => {
            document.getElementById('cartSidebar').classList.add('open');
            document.getElementById('cartOverlay').classList.add('open');
        });
        
        document.getElementById('closeCartBtn').addEventListener('click', () => {
            document.getElementById('cartSidebar').classList.remove('open');
            document.getElementById('cartOverlay').classList.remove('open');
        });
        
        document.getElementById('cartOverlay').addEventListener('click', () => {
            document.getElementById('cartSidebar').classList.remove('open');
            document.getElementById('cartOverlay').classList.remove('open');
        });
        
        document.getElementById('checkoutBtn').addEventListener('click', () => {
            if (cart.length === 0) {
                showToast('السلة فارغة', 'error');
                return;
            }
            document.getElementById('checkoutModal').style.display = 'flex';
        });
        
        document.getElementById('closeCheckoutBtn').addEventListener('click', () => {
            document.getElementById('checkoutModal').style.display = 'none';
        });
        
        // اختيار طريقة الدفع
        document.querySelectorAll('.payment-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedPayment = opt.dataset.method;
            });
        });
        document.querySelector('.payment-option').classList.add('selected');
        
        // إرسال الطلب
        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();
            
            if (name.length < 3) {
                showToast('الاسم يجب أن يكون 3 أحرف على الأقل', 'error');
                return;
            }
            if (!/^01[0-9]{9}$/.test(phone)) {
                showToast('رقم الهاتف غير صحيح', 'error');
                return;
            }
            if (address.length < 10) {
                showToast('العنوان غير مكتمل', 'error');
                return;
            }
            
            const paymentNames = { instapay: 'إنستاباي', vodafone: 'فودافون كاش', orange: 'إي أند كاش' };
            const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            
            const order = {
                customerName: name,
                phone: phone,
                address: address,
                paymentMethod: paymentNames[selectedPayment],
                total: total,
                products: cart.map(item => ({
                    id: item.id,
                    name: item.name,
                    price: item.price,
                    quantity: item.quantity,
                    image: item.image
                }))
            };
            
            await createOrder(order);
        });
        
        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type}`;
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.zIndex = '9999';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        window.updateQuantity = updateQuantity;
        window.removeFromCart = removeFromCart;
        
        // تشغيل
        loadCart();
        loadData();
        
        // تحديث السلايدر كل 5 ثواني
        setInterval(() => {
            if (sliders.length > 1) changeSlide(1);
        }, 5000);
    </script>
</body>
</html>
