<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المدير | متجر أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #00B4D8, #90E0EF);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: #B8860B;
            margin-bottom: 1rem;
        }
        .logo span { color: #00B4D8; }
        input {
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-family: inherit;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #00B4D8, #90E0EF);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        .error { color: red; margin-top: 1rem; }
        .back-link { display: block; margin-top: 1rem; color: #666; text-decoration: none; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">أولاد <span>شعلان</span></div>
    <h2>تسجيل دخول المدير</h2>
    <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="off">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="login()"><i class="fas fa-sign-in-alt"></i> دخول</button>
    <div id="errorMsg" class="error"></div>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للمتجر</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
        authDomain: "awlad-sh3lan-store.firebaseapp.com",
        projectId: "awlad-sh3lan-store",
        storageBucket: "awlad-sh3lan-store.firebasestorage.app",
        messagingSenderId: "77191704198",
        appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        
        if (!email || !password) {
            errorDiv.innerText = 'الرجاء إدخال البريد الإلكتروني وكلمة المرور';
            return;
        }
        
        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const uid = userCredential.user.uid;
            
            // التحقق من وجود المستخدم في مجموعة admins
            const adminDoc = await db.collection('admins').doc(uid).get();
            if (adminDoc.exists) {
                localStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                errorDiv.innerText = 'ليس لديك صلاحيات الوصول للوحة التحكم';
                await auth.signOut();
            }
        } catch (error) {
            errorDiv.innerText = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
        }
    }
</script>
</body>
</html>
