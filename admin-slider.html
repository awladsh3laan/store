<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة السلايدر | أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f0f2f5;
            font-size: 16px;
            line-height: 1.6;
        }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --dark-bg: #1a2a3a;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
            --radius: 16px;
            --radius-sm: 10px;
        }

        .header {
            background: var(--dark-bg);
            color: white;
            padding: 0.6rem 4%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-img {
            height: 40px;
            width: auto;
            max-width: 140px;
            object-fit: contain;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .header-actions span {
            color: var(--gold-light);
            font-size: 0.9rem;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
        }
        .logout-btn:hover {
            background: #c82333;
        }

        .container {
            padding: 1rem 4%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--sky-blue);
            text-decoration: none;
            font-size: 0.95rem;
            transition: var(--transition);
        }
        .back-link:hover {
            color: var(--gold-dark);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            padding: 0.5rem 1.2rem;
            background: white;
            border: 2px solid #ddd;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            flex: 1 1 auto;
            min-width: 80px;
            text-align: center;
        }
        .tab-btn.active {
            border-color: var(--sky-blue);
            background: var(--sky-blue);
            color: white;
        }

        .tab-pane {
            display: none;
            background: white;
            padding: 1.2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .tab-pane.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
        }
        .form-grid input,
        .form-grid select,
        .form-grid textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }
        .form-grid input:focus,
        .form-grid select:focus,
        .form-grid textarea:focus {
            border-color: var(--sky-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.1);
        }
        .form-grid .full {
            grid-column: 1 / -1;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary {
            background: var(--sky-blue);
            color: white;
        }
        .btn-primary:hover {
            background: #0098b8;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover {
            background: #218838;
        }
        .btn-sm {
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        .image-preview {
            max-width: 150px;
            max-height: 100px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            margin-top: 0.5rem;
        }

        .items-grid {
            display: grid;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .item-card {
            background: #f9f9f9;
            padding: 0.8rem;
            border-radius: var(--radius-sm);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            border: 1px solid #eee;
            transition: var(--transition);
        }
        .item-card:hover {
            background: #f0f0f0;
        }
        .item-card .item-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .item-card .item-info img {
            width: 60px;
            height: 45px;
            object-fit: cover;
            border-radius: var(--radius-sm);
        }
        .item-card .item-info .details {
            flex: 1;
            min-width: 100px;
        }
        .item-card .item-info .details strong {
            display: block;
            font-size: 0.95rem;
        }
        .item-card .item-info .details small {
            color: #888;
            font-size: 0.8rem;
        }
        .item-card .item-actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-active {
            background: #28a745;
            color: white;
        }
        .status-inactive {
            background: #dc3545;
            color: white;
        }

        .spinner {
            display: none;
            text-align: center;
            padding: 0.5rem;
            color: var(--sky-blue);
        }
        .spinner.show {
            display: block;
        }
        .spinner i {
            font-size: 1.5rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* معاينة السلايدر */
        .preview-container {
            border: 2px dashed #ddd;
            border-radius: var(--radius-sm);
            padding: 1rem;
            text-align: center;
            margin-top: 1rem;
            background: #fafafa;
        }
        .preview-container img {
            max-width: 100%;
            max-height: 200px;
            border-radius: var(--radius-sm);
            object-fit: cover;
        }

        .footer {
            background: var(--dark-bg);
            color: white;
            padding: 1.5rem 5%;
            text-align: center;
            font-size: 0.85rem;
            margin-top: 2rem;
        }

        @media (min-width: 600px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                padding: 0.8rem 5%;
            }
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
            .item-card {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
            .item-card .item-actions {
                flex: 0 0 auto;
            }
            .container {
                padding: 1.5rem 5%;
            }
            .tab-btn {
                flex: 0 1 auto;
            }
        }
        @media (min-width: 1024px) {
            .container {
                padding: 2rem 5%;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="https://i.servimg.com/u/f54/18/11/62/61/tm/picsar12.png" alt="أولاد شعلان" class="logo-img">
        <div class="header-actions">
            <span><i class="fas fa-images"></i> إدارة السلايدر</span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <div class="container">
        <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('sliders')">🖼️ السلايدر</button>
            <button class="tab-btn" onclick="showTab('banners')">📢 البنرات</button>
        </div>

        <!-- ===== تبويب السلايدر ===== -->
        <div id="slidersTab" class="tab-pane active">
            <h3 style="color:var(--gold-dark);margin-bottom:1rem;"><i class="fas fa-plus-circle"></i> إضافة سلايدر جديد</h3>
            <form id="sliderForm" class="form-grid">
                <input type="text" id="sTitle" placeholder="عنوان السلايدر" required>
                <input type="text" id="sSubtitle" placeholder="نص فرعي (اختياري)">
                <input type="text" id="sLink" placeholder="رابط (اختياري)">
                <input type="number" id="sOrder" placeholder="ترتيب" value="0">
                <select id="sActive">
                    <option value="true">نشط</option>
                    <option value="false">غير نشط</option>
                </select>
                <div class="full">
                    <input type="file" id="sImage" accept="image/*" required>
                    <img id="sPreview" class="image-preview" style="display:none;">
                    <div class="spinner" id="sliderSpinner"><i class="fas fa-spinner"></i> جاري رفع الصورة...</div>
                </div>
                <div class="full">
                    <button type="submit" class="btn btn-primary" id="sliderSubmitBtn"><i class="fas fa-save"></i> إضافة السلايدر</button>
                </div>
            </form>

            <h3 style="color:var(--gold-dark);margin:1.5rem 0 0.5rem;">السلايدرات الحالية</h3>
            <div id="slidersList" class="items-grid"></div>
        </div>

        <!-- ===== تبويب البنرات ===== -->
        <div id="bannersTab" class="tab-pane">
            <h3 style="color:var(--gold-dark);margin-bottom:1rem;"><i class="fas fa-plus-circle"></i> إضافة بانر جديد</h3>
            <form id="bannerForm" class="form-grid">
                <input type="text" id="bTitle" placeholder="عنوان البانر" required>
                <input type="text" id="bLink" placeholder="الرابط (اختياري)">
                <select id="bPosition">
                    <option value="homepage">الصفحة الرئيسية</option>
                    <option value="footer">قبل الفوتر</option>
                </select>
                <select id="bActive">
                    <option value="true">نشط</option>
                    <option value="false">غير نشط</option>
                </select>
                <div class="full">
                    <input type="file" id="bImage" accept="image/*" required>
                    <img id="bPreview" class="image-preview" style="display:none;">
                    <div class="spinner" id="bannerSpinner"><i class="fas fa-spinner"></i> جاري رفع الصورة...</div>
                </div>
                <div class="full">
                    <button type="submit" class="btn btn-primary" id="bannerSubmitBtn"><i class="fas fa-save"></i> إضافة البانر</button>
                </div>
            </form>

            <h3 style="color:var(--gold-dark);margin:1.5rem 0 0.5rem;">البنرات الحالية</h3>
            <div id="bannersList" class="items-grid"></div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 متجر أولاد شعلان - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
            authDomain: "awlad-sh3lan-store.firebaseapp.com",
            projectId: "awlad-sh3lan-store",
            storageBucket: "awlad-sh3lan-store.firebasestorage.app",
            messagingSenderId: "77191704198",
            appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const IMGBB_API_KEY = "99506f7c2987acaf6709c7fb0e978298";

        // ===== التحقق من تسجيل الدخول =====
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'admin.html';
                return;
            }
            try {
                const adminDoc = await db.collection('admins').doc(user.uid).get();
                if (!adminDoc.exists) {
                    await auth.signOut();
                    window.location.href = 'admin.html';
                    return;
                }
                loadSliders();
                loadBanners();
            } catch (error) {
                console.error('خطأ في التحقق:', error);
            }
        });

        // ===== رفع الصور =====
        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append("image", file);
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            const data = await response.json();
            if (data.success) return data.data.url;
            throw new Error("فشل رفع الصورة: " + (data.error?.message || ''));
        }

        // ===== معاينة الصورة =====
        function previewImage(input, previewId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById(previewId).style.display = 'block';
                    document.getElementById(previewId).src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('sImage')?.addEventListener('change', (e) => previewImage(e.target, 'sPreview'));
        document.getElementById('bImage')?.addEventListener('change', (e) => previewImage(e.target, 'bPreview'));

        // ===== إضافة سلايدر =====
        document.getElementById('sliderForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('sImage').files[0];
            if (!file) {
                alert('الرجاء اختيار صورة');
                return;
            }

            const spinner = document.getElementById('sliderSpinner');
            const submitBtn = document.getElementById('sliderSubmitBtn');
            spinner.classList.add('show');
            submitBtn.disabled = true;

            try {
                const imageUrl = await uploadToImgBB(file);
                await db.collection('sliders').add({
                    title: document.getElementById('sTitle').value,
                    subtitle: document.getElementById('sSubtitle').value,
                    link: document.getElementById('sLink').value,
                    order: parseInt(document.getElementById('sOrder').value) || 0,
                    active: document.getElementById('sActive').value === 'true',
                    imageUrl: imageUrl,
                    createdAt: new Date().toISOString()
                });
                alert('✅ تم إضافة السلايدر');
                document.getElementById('sliderForm').reset();
                document.getElementById('sPreview').style.display = 'none';
                loadSliders();
            } catch (error) {
                alert('❌ حدث خطأ: ' + error.message);
            } finally {
                spinner.classList.remove('show');
                submitBtn.disabled = false;
            }
        });

        // ===== عرض السلايدرات =====
        async function loadSliders() {
            try {
                const snapshot = await db.collection('sliders').orderBy('order').get();
                const container = document.getElementById('slidersList');
                if (snapshot.empty) {
                    container.innerHTML = '<p style="color:#999;text-align:center;padding:1rem;">لا توجد سلايدرات</p>';
                    return;
                }
                container.innerHTML = snapshot.docs.map(doc => {
                    const s = doc.data();
                    return `
                        <div class="item-card">
                            <div class="item-info">
                                <img src="${s.imageUrl}" alt="${s.title || 'سلايدر'}">
                                <div class="details">
                                    <strong>${s.title || 'بدون عنوان'}</strong>
                                    <small>الترتيب: ${s.order || 0} | ${s.subtitle || ''}</small>
                                    <span class="status-badge ${s.active ? 'status-active' : 'status-inactive'}">${s.active ? 'نشط' : 'غير نشط'}</span>
                                </div>
                            </div>
                            <div class="item-actions">
                                <button class="btn btn-success btn-sm" onclick="toggleSlider('${doc.id}', ${!s.active})">
                                    <i class="fas ${s.active ? 'fa-eye-slash' : 'fa-eye'}"></i>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="deleteSlider('${doc.id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('خطأ في تحميل السلايدرات:', error);
            }
        }

        // ===== تبديل حالة السلايدر =====
        async function toggleSlider(id, newStatus) {
            try {
                await db.collection('sliders').doc(id).update({ active: newStatus });
                loadSliders();
            } catch (error) {
                alert('❌ حدث خطأ: ' + error.message);
            }
        }

        // ===== حذف سلايدر =====
        async function deleteSlider(id) {
            if (confirm('⚠️ هل أنت متأكد من حذف هذا السلايدر؟')) {
                try {
                    await db.collection('sliders').doc(id).delete();
                    loadSliders();
                } catch (error) {
                    alert('❌ حدث خطأ: ' + error.message);
                }
            }
        }

        // ===== إضافة بانر =====
        document.getElementById('bannerForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('bImage').files[0];
            if (!file) {
                alert('الرجاء اختيار صورة');
                return;
            }

            const spinner = document.getElementById('bannerSpinner');
            const submitBtn = document.getElementById('bannerSubmitBtn');
            spinner.classList.add('show');
            submitBtn.disabled = true;

            try {
                const imageUrl = await uploadToImgBB(file);
                await db.collection('banners').add({
                    title: document.getElementById('bTitle').value,
                    link: document.getElementById('bLink').value,
                    position: document.getElementById('bPosition').value,
                    active: document.getElementById('bActive').value === 'true',
                    imageUrl: imageUrl,
                    createdAt: new Date().toISOString()
                });
                alert('✅ تم إضافة البانر');
                document.getElementById('bannerForm').reset();
                document.getElementById('bPreview').style.display = 'none';
                loadBanners();
            } catch (error) {
                alert('❌ حدث خطأ: ' + error.message);
            } finally {
                spinner.classList.remove('show');
                submitBtn.disabled = false;
            }
        });

        // ===== عرض البنرات =====
        async function loadBanners() {
            try {
                const snapshot = await db.collection('banners').get();
                const container = document.getElementById('bannersList');
                if (snapshot.empty) {
                    container.innerHTML = '<p style="color:#999;text-align:center;padding:1rem;">لا توجد بنرات</p>';
                    return;
                }
                container.innerHTML = snapshot.docs.map(doc => {
                    const b = doc.data();
                    return `
                        <div class="item-card">
                            <div class="item-info">
                                <img src="${b.imageUrl}" alt="${b.title || 'بانر'}">
                                <div class="details">
                                    <strong>${b.title || 'بدون عنوان'}</strong>
                                    <small>${b.position || 'الصفحة الرئيسية'}</small>
                                    <span class="status-badge ${b.active ? 'status-active' : 'status-inactive'}">${b.active ? 'نشط' : 'غير نشط'}</span>
                                </div>
                            </div>
                            <div class="item-actions">
                                <button class="btn btn-success btn-sm" onclick="toggleBanner('${doc.id}', ${!b.active})">
                                    <i class="fas ${b.active ? 'fa-eye-slash' : 'fa-eye'}"></i>
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="deleteBanner('${doc.id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('خطأ في تحميل البنرات:', error);
            }
        }

        // ===== تبديل حالة البانر =====
        async function toggleBanner(id, newStatus) {
            try {
                await db.collection('banners').doc(id).update({ active: newStatus });
                loadBanners();
            } catch (error) {
                alert('❌ حدث خطأ: ' + error.message);
            }
        }

        // ===== حذف بانر =====
        async function deleteBanner(id) {
            if (confirm('⚠️ هل أنت متأكد من حذف هذا البانر؟')) {
                try {
                    await db.collection('banners').doc(id).delete();
                    loadBanners();
                } catch (error) {
                    alert('❌ حدث خطأ: ' + error.message);
                }
            }
        }

        // ===== التبويبات =====
        function showTab(tab) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (tab === 'sliders') {
                document.getElementById('slidersTab').classList.add('active');
                document.querySelector('.tab-btn').classList.add('active');
            } else {
                document.getElementById('bannersTab').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
        }

        // ===== تسجيل الخروج =====
        async function logout() {
            await auth.signOut();
            window.location.href = 'admin.html';
        }

        // ===== تصدير الدوال =====
        window.toggleSlider = toggleSlider;
        window.deleteSlider = deleteSlider;
        window.toggleBanner = toggleBanner;
        window.deleteBanner = deleteBanner;
        window.showTab = showTab;
        window.logout = logout;
    </script>

</body>
</html>
