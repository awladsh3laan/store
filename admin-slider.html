<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة السلايدر | أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --dark-bg: #1a2a3a;
            --shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .header {
            background: var(--dark-bg);
            color: white;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo-img { height: 40px; width: auto; max-width: 140px; object-fit: contain; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 0.4rem 1.2rem; border-radius: 25px; cursor: pointer; }
        .container { padding: 1.5rem 5%; }
        .back-link { display: inline-block; margin-bottom: 1rem; color: var(--sky-blue); text-decoration: none; }
        .tabs { display: flex; gap: 0.8rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab-btn { padding: 0.6rem 1.5rem; background: white; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; box-shadow: var(--shadow); }
        .tab-btn.active { background: var(--sky-blue); color: white; }
        .tab-pane { display: none; background: white; padding: 1.5rem; border-radius: 20px; box-shadow: var(--shadow); }
        .tab-pane.active { display: block; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-grid input, .form-grid select, .form-grid textarea { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        .form-grid .full { grid-column: 1 / -1; }
        .btn { padding: 0.7rem 1.5rem; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--sky-blue); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-sm { padding: 0.2rem 0.8rem; border: none; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .image-preview { max-width: 150px; max-height: 100px; object-fit: cover; border-radius: 10px; margin-top: 0.5rem; }
        .items-grid { display: grid; gap: 0.8rem; margin-top: 1rem; }
        .item-card { background: #f9f9f9; padding: 0.8rem 1rem; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .item-card img { width: 60px; height: 40px; object-fit: cover; border-radius: 8px; }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; }
        .status-active { background: #28a745; color: white; }
        .status-inactive { background: #dc3545; color: white; }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
            .item-card { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<header class="header">
    <img src="https://i.servimg.com/u/f54/18/11/62/61/tm/picsar12.png" alt="أولاد شعلان" class="logo-img">
    <div><span style="color:var(--gold-light);">إدارة السلايدر</span> <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button></div>
</header>

<div class="container">
    <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('sliders')">🖼️ السلايدر</button>
        <button class="tab-btn" onclick="showTab('banners')">📢 البنرات</button>
    </div>

    <!-- ===== تبويب السلايدر ===== -->
    <div id="slidersTab" class="tab-pane active">
        <h3><i class="fas fa-plus-circle"></i> إضافة سلايدر جديد</h3>
        <form id="sliderForm" class="form-grid">
            <input type="text" id="sTitle" placeholder="عنوان السلايدر" required>
            <input type="text" id="sSubtitle" placeholder="نص فرعي (اختياري)">
            <input type="text" id="sLink" placeholder="رابط (اختياري)">
            <input type="number" id="sOrder" placeholder="ترتيب" value="0">
            <select id="sActive"><option value="true">نشط</option><option value="false">غير نشط</option></select>
            <div class="full">
                <input type="file" id="sImage" accept="image/*" required>
                <img id="sPreview" class="image-preview" style="display:none;">
            </div>
            <div class="full"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> إضافة السلايدر</button></div>
        </form>
        <h3 style="margin-top:1.5rem;">السلايدرات الحالية</h3>
        <div id="slidersList" class="items-grid"></div>
    </div>

    <!-- ===== تبويب البنرات ===== -->
    <div id="bannersTab" class="tab-pane">
        <h3><i class="fas fa-plus-circle"></i> إضافة بانر جديد</h3>
        <form id="bannerForm" class="form-grid">
            <input type="text" id="bTitle" placeholder="عنوان البانر" required>
            <input type="text" id="bLink" placeholder="الرابط">
            <select id="bPosition"><option value="homepage">الصفحة الرئيسية</option><option value="footer">قبل الفوتر</option></select>
            <select id="bActive"><option value="true">نشط</option><option value="false">غير نشط</option></select>
            <div class="full">
                <input type="file" id="bImage" accept="image/*" required>
                <img id="bPreview" class="image-preview" style="display:none;">
            </div>
            <div class="full"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> إضافة البانر</button></div>
        </form>
        <h3 style="margin-top:1.5rem;">البنرات الحالية</h3>
        <div id="bannersList" class="items-grid"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
        authDomain: "awlad-sh3lan-store.firebaseapp.com",
        projectId: "awlad-sh3lan-store",
        storageBucket: "awlad-sh3lan-store.firebasestorage.app",
        messagingSenderId: "77191704198",
        appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const IMGBB_API_KEY = "99506f7c2987acaf6709c7fb0e978298";

    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'admin.html'; return; }
        const adminDoc = await db.collection('admins').doc(user.uid).get();
        if (!adminDoc.exists) { await auth.signOut(); window.location.href = 'admin.html'; return; }
        loadSliders();
        loadBanners();
    });

    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append("image", file);
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
        const data = await response.json();
        if (data.success) return data.data.url;
        throw new Error("فشل رفع الصورة");
    }

    function previewImage(input, previewId) {
        const file = input.files[0];
        if (file) { const reader = new FileReader(); reader.onload = (e) => { document.getElementById(previewId).style.display = 'block'; document.getElementById(previewId).src = e.target.result; }; reader.readAsDataURL(file); }
    }

    document.getElementById('sImage')?.addEventListener('change', (e) => previewImage(e.target, 'sPreview'));
    document.getElementById('bImage')?.addEventListener('change', (e) => previewImage(e.target, 'bPreview'));

    // ===== إضافة سلايدر =====
    document.getElementById('sliderForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const file = document.getElementById('sImage').files[0];
        if (!file) { alert('الرجاء اختيار صورة'); return; }
        const imageUrl = await uploadToImgBB(file);
        await db.collection('sliders').add({
            title: document.getElementById('sTitle').value,
            subtitle: document.getElementById('sSubtitle').value,
            link: document.getElementById('sLink').value,
            order: parseInt(document.getElementById('sOrder').value) || 0,
            active: document.getElementById('sActive').value === 'true',
            imageUrl: imageUrl,
            createdAt: new Date().toISOString()
        });
        alert('✅ تم إضافة السلايدر');
        document.getElementById('sliderForm').reset();
        document.getElementById('sPreview').style.display = 'none';
        loadSliders();
    });

    async function loadSliders() {
        const snapshot = await db.collection('sliders').orderBy('order').get();
        const container = document.getElementById('slidersList');
        container.innerHTML = snapshot.docs.map(doc => {
            const s = doc.data();
            return `
                <div class="item-card">
                    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
                        <img src="${s.imageUrl}" alt="${s.title}">
                        <div><strong>${s.title}</strong> ${s.subtitle ? `- ${s.subtitle}` : ''}<br><span class="status-badge ${s.active ? 'status-active' : 'status-inactive'}">${s.active ? 'نشط' : 'غير نشط'}</span></div>
                    </div>
                    <div>
                        <button class="btn-sm btn-primary" onclick="toggleSlider('${doc.id}', ${!s.active})"><i class="fas fa-power-off"></i></button>
                        <button class="btn-sm btn-danger" onclick="deleteSlider('${doc.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function toggleSlider(id, newStatus) { await db.collection('sliders').doc(id).update({ active: newStatus }); loadSliders(); }
    async function deleteSlider(id) { if (confirm('هل أنت متأكد؟')) { await db.collection('sliders').doc(id).delete(); loadSliders(); } }

    // ===== إضافة بانر =====
    document.getElementById('bannerForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const file = document.getElementById('bImage').files[0];
        if (!file) { alert('الرجاء اختيار صورة'); return; }
        const imageUrl = await uploadToImgBB(file);
        await db.collection('banners').add({
            title: document.getElementById('bTitle').value,
            link: document.getElementById('bLink').value,
            position: document.getElementById('bPosition').value,
            active: document.getElementById('bActive').value === 'true',
            imageUrl: imageUrl,
            createdAt: new Date().toISOString()
        });
        alert('✅ تم إضافة البانر');
        document.getElementById('bannerForm').reset();
        document.getElementById('bPreview').style.display = 'none';
        loadBanners();
    });

    async function loadBanners() {
        const snapshot = await db.collection('banners').get();
        const container = document.getElementById('bannersList');
        container.innerHTML = snapshot.docs.map(doc => {
            const b = doc.data();
            return `
                <div class="item-card">
                    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
                        <img src="${b.imageUrl}" alt="${b.title}">
                        <div><strong>${b.title}</strong> - ${b.position}<br><span class="status-badge ${b.active ? 'status-active' : 'status-inactive'}">${b.active ? 'نشط' : 'غير نشط'}</span></div>
                    </div>
                    <div>
                        <button class="btn-sm btn-primary" onclick="toggleBanner('${doc.id}', ${!b.active})"><i class="fas fa-power-off"></i></button>
                        <button class="btn-sm btn-danger" onclick="deleteBanner('${doc.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function toggleBanner(id, newStatus) { await db.collection('banners').doc(id).update({ active: newStatus }); loadBanners(); }
    async function deleteBanner(id) { if (confirm('هل أنت متأكد؟')) { await db.collection('banners').doc(id).delete(); loadBanners(); } }

    function showTab(tab) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if (tab === 'sliders') { document.getElementById('slidersTab').classList.add('active'); document.querySelector('.tab-btn').classList.add('active'); }
        else { document.getElementById('bannersTab').classList.add('active'); document.querySelectorAll('.tab-btn')[1].classList.add('active'); }
    }

    async function logout() { await auth.signOut(); window.location.href = 'admin.html'; }

    window.toggleSlider = toggleSlider;
    window.deleteSlider = deleteSlider;
    window.toggleBanner = toggleBanner;
    window.deleteBanner = deleteBanner;
    window.showTab = showTab;
    window.logout = logout;
</script>

</body>
</html>
