<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة السلايدر | متجر أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --green-light: #90E0EF;
            --dark-bg: #1a2a3a;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header {
            background: var(--dark-bg);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo { font-size: 1.3rem; font-weight: 800; color: var(--gold-light); }
        .logo span { color: var(--sky-blue); }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 0.5rem 1rem; border-radius: 25px; cursor: pointer; }
        .container { padding: 2rem 5%; }
        .back-link { display: inline-block; margin-bottom: 1rem; color: var(--sky-blue); text-decoration: none; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .tab-btn { padding: 0.8rem 1.5rem; background: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--sky-blue); color: white; }
        .tab-pane { display: none; background: white; padding: 2rem; border-radius: 20px; box-shadow: var(--shadow); }
        .tab-pane.active { display: block; }
        form input, form textarea, form select { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        button { background: var(--sky-blue); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 30px; cursor: pointer; margin-top: 1rem; }
        .image-preview { width: 150px; height: 100px; object-fit: cover; margin: 0.5rem 0; border-radius: 10px; }
        .items-grid { display: grid; gap: 1rem; margin-top: 1rem; }
        .item-card { background: #f9f9f9; padding: 1rem; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .edit-btn, .delete-btn { padding: 0.5rem 1rem; margin: 0 0.25rem; border: none; border-radius: 5px; cursor: pointer; }
        .edit-btn { background: var(--gold-dark); color: white; }
        .delete-btn { background: #dc3545; color: white; }
        .status-badge { padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.8rem; }
        .status-active { background: #28a745; color: white; }
        .status-inactive { background: #dc3545; color: white; }
        @media (max-width: 768px) { .item-card { flex-direction: column; gap: 0.5rem; text-align: center; } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">أولاد <span>شعلان</span> | إدارة السلايدر</div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
</header>

<div class="container">
    <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('sliders')">السلايدر الرئيسي</button>
        <button class="tab-btn" onclick="showTab('banners')">البنرات الإعلانية</button>
    </div>
    
    <!-- تبويب السلايدر -->
    <div id="slidersTab" class="tab-pane active">
        <h3><i class="fas fa-plus-circle"></i> إضافة سلايدر جديد</h3>
        <form id="sliderForm">
            <input type="text" id="sliderTitle" placeholder="عنوان السلايدر" required>
            <textarea id="sliderSubtitle" placeholder="نص فرعي (اختياري)" rows="2"></textarea>
            <input type="text" id="sliderLink" placeholder="رابط عند الضغط (اختياري)">
            <input type="number" id="sliderOrder" placeholder="ترتيب الظهور" value="0">
            <select id="sliderActive">
                <option value="true">نشط</option>
                <option value="false">غير نشط</option>
            </select>
            <input type="file" id="sliderImage" accept="image/*" required>
            <img id="imagePreview" class="image-preview" style="display:none">
            <button type="submit"><i class="fas fa-save"></i> إضافة السلايدر</button>
        </form>
        
        <h3 style="margin-top: 2rem;"><i class="fas fa-list"></i> السلايدرات الحالية</h3>
        <div id="slidersList" class="items-grid"></div>
    </div>
    
    <!-- تبويب البنرات -->
    <div id="bannersTab" class="tab-pane">
        <h3><i class="fas fa-plus-circle"></i> إضافة بانر جديد</h3>
        <form id="bannerForm">
            <input type="text" id="bannerTitle" placeholder="عنوان البانر" required>
            <input type="text" id="bannerLink" placeholder="الرابط (مثل /products/العرض)">
            <select id="bannerPosition">
                <option value="homepage">الصفحة الرئيسية</option>
                <option value="sidebar">الشريط الجانبي</option>
                <option value="footer">قبل الفوتر</option>
            </select>
            <select id="bannerActive">
                <option value="true">نشط</option>
                <option value="false">غير نشط</option>
            </select>
            <input type="file" id="bannerImage" accept="image/*" required>
            <img id="bannerPreview" class="image-preview" style="display:none">
            <button type="submit"><i class="fas fa-save"></i> إضافة البانر</button>
        </form>
        
        <h3 style="margin-top: 2rem;"><i class="fas fa-list"></i> البنرات الحالية</h3>
        <div id="bannersList" class="items-grid"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
        authDomain: "awlad-sh3lan-store.firebaseapp.com",
        projectId: "awlad-sh3lan-store",
        storageBucket: "awlad-sh3lan-store.firebasestorage.app",
        messagingSenderId: "77191704198",
        appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const IMGBB_API_KEY = "99506f7c2987acaf6709c7fb0e978298";
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'admin-login.html'; return; }
        const adminDoc = await db.collection('admins').doc(user.uid).get();
        if (!adminDoc.exists) { await auth.signOut(); window.location.href = 'admin-login.html'; return; }
        loadSliders();
        loadBanners();
    });
    
    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append("image", file);
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
        const data = await response.json();
        if (data.success) return data.data.url;
        throw new Error("فشل رفع الصورة");
    }
    
    function previewImage(input, previewId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { document.getElementById(previewId).style.display = 'block'; document.getElementById(previewId).src = e.target.result; };
            reader.readAsDataURL(input.files[0]);
        }
    }
    
    document.getElementById('sliderImage')?.addEventListener('change', (e) => previewImage(e.target, 'imagePreview'));
    document.getElementById('bannerImage')?.addEventListener('change', (e) => previewImage(e.target, 'bannerPreview'));
    
    // إضافة سلايدر
    document.getElementById('sliderForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const imageFile = document.getElementById('sliderImage').files[0];
        if (!imageFile) { alert('الرجاء اختيار صورة'); return; }
        const imageUrl = await uploadToImgBB(imageFile);
        
        await db.collection('sliders').add({
            title: document.getElementById('sliderTitle').value,
            subtitle: document.getElementById('sliderSubtitle').value,
            link: document.getElementById('sliderLink').value,
            order: parseInt(document.getElementById('sliderOrder').value) || 0,
            active: document.getElementById('sliderActive').value === 'true',
            imageUrl: imageUrl,
            createdAt: new Date().toISOString()
        });
        alert('تم إضافة السلايدر');
        document.getElementById('sliderForm').reset();
        document.getElementById('imagePreview').style.display = 'none';
        loadSliders();
    });
    
    // إضافة بانر
    document.getElementById('bannerForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const imageFile = document.getElementById('bannerImage').files[0];
        if (!imageFile) { alert('الرجاء اختيار صورة'); return; }
        const imageUrl = await uploadToImgBB(imageFile);
        
        await db.collection('banners').add({
            title: document.getElementById('bannerTitle').value,
            link: document.getElementById('bannerLink').value,
            position: document.getElementById('bannerPosition').value,
            active: document.getElementById('bannerActive').value === 'true',
            imageUrl: imageUrl,
            createdAt: new Date().toISOString()
        });
        alert('تم إضافة البانر');
        document.getElementById('bannerForm').reset();
        document.getElementById('bannerPreview').style.display = 'none';
        loadBanners();
    });
    
    async function loadSliders() {
        const snapshot = await db.collection('sliders').orderBy('order').get();
        const container = document.getElementById('slidersList');
        if (!container) return;
        container.innerHTML = snapshot.docs.map(doc => {
            const s = doc.data();
            return `
                <div class="item-card">
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <img src="${s.imageUrl}" style="width: 80px; height: 50px; object-fit: cover; border-radius: 5px;">
                        <div>
                            <strong>${s.title}</strong><br>
                            <small>الترتيب: ${s.order}</small>
                            <span class="status-badge ${s.active ? 'status-active' : 'status-inactive'}">${s.active ? 'نشط' : 'غير نشط'}</span>
                        </div>
                    </div>
                    <div>
                        <button class="edit-btn" onclick="toggleSliderStatus('${doc.id}', ${!s.active})"><i class="fas fa-power-off"></i> ${s.active ? 'تعطيل' : 'تفعيل'}</button>
                        <button class="delete-btn" onclick="deleteSlider('${doc.id}')"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    async function loadBanners() {
        const snapshot = await db.collection('banners').get();
        const container = document.getElementById('bannersList');
        if (!container) return;
        container.innerHTML = snapshot.docs.map(doc => {
            const b = doc.data();
            return `
                <div class="item-card">
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <img src="${b.imageUrl}" style="width: 80px; height: 50px; object-fit: cover; border-radius: 5px;">
                        <div>
                            <strong>${b.title}</strong><br>
                            <small>الموقع: ${b.position}</small>
                            <span class="status-badge ${b.active ? 'status-active' : 'status-inactive'}">${b.active ? 'نشط' : 'غير نشط'}</span>
                        </div>
                    </div>
                    <div>
                        <button class="edit-btn" onclick="toggleBannerStatus('${doc.id}', ${!b.active})"><i class="fas fa-power-off"></i> ${b.active ? 'تعطيل' : 'تفعيل'}</button>
                        <button class="delete-btn" onclick="deleteBanner('${doc.id}')"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    async function toggleSliderStatus(id, newStatus) {
        await db.collection('sliders').doc(id).update({ active: newStatus });
        loadSliders();
    }
    
    async function deleteSlider(id) {
        if (confirm('هل أنت متأكد من حذف هذا السلايدر؟')) {
            await db.collection('sliders').doc(id).delete();
            loadSliders();
        }
    }
    
    async function toggleBannerStatus(id, newStatus) {
        await db.collection('banners').doc(id).update({ active: newStatus });
        loadBanners();
    }
    
    async function deleteBanner(id) {
        if (confirm('هل أنت متأكد من حذف هذا البانر؟')) {
            await db.collection('banners').doc(id).delete();
            loadBanners();
        }
    }
    
    function showTab(tab) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if (tab === 'sliders') {
            document.getElementById('slidersTab').classList.add('active');
            document.querySelector('.tab-btn').classList.add('active');
        } else {
            document.getElementById('bannersTab').classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            loadBanners();
        }
    }
    
    async function logout() { await auth.signOut(); window.location.href = 'admin-login.html'; }
    
    window.toggleSliderStatus = toggleSliderStatus;
    window.deleteSlider = deleteSlider;
    window.toggleBannerStatus = toggleBannerStatus;
    window.deleteBanner = deleteBanner;
    window.showTab = showTab;
    window.logout = logout;
</script>

</body>
</html>
