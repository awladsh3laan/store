<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة السلايدر - متجر أولاد شعلان</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <!-- Style -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* استايلات إدارة السلايدر */
        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .add-slider-btn {
            background: var(--success-green);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: bold;
        }
        
        /* نموذج إضافة سلايد */
        .slider-form-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .slider-form-container {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
        }
        
        .image-preview {
            width: 100%;
            height: 200px;
            border: 2px dashed #E0E0E0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .image-preview i {
            font-size: 40px;
            color: var(--gray-text);
        }
        
        /* بطاقات السلايدر */
        .sliders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .slider-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
        }
        
        .slider-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        
        .slider-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        
        .slider-info {
            padding: 15px;
        }
        
        .slider-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-dark);
        }
        
        .slider-link {
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 14px;
            display: block;
            margin-top: 10px;
            word-break: break-all;
        }
        
        .slider-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #EEE;
        }
        
        .slider-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .edit-slider {
            background: var(--secondary-gold);
            color: var(--primary-dark);
        }
        
        .delete-slider {
            background: var(--danger-red);
            color: white;
        }
        
        .order-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary-dark);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .empty-sliders {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            color: var(--gray-text);
        }
        
        .empty-sliders i {
            font-size: 60px;
            margin-bottom: 20px;
            color: var(--primary-blue);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- الشريط الجانبي -->
        <div class="admin-sidebar">
            <h3><i class="fas fa-store"></i> متجر أولاد شعلان</h3>
            <a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> لوحة التحكم</a>
            <a href="admin-products.html"><i class="fas fa-box"></i> المنتجات</a>
            <a href="admin-slider.html" class="active"><i class="fas fa-images"></i> السلايدر</a>
            <a href="admin-shipping.html"><i class="fas fa-truck"></i> الشحن</a>
            <a href="admin-orders.html"><i class="fas fa-list"></i> الطلبات</a>
            <a href="#" id="sidebarLogout"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</a>
        </div>
        
        <!-- المحتوى الرئيسي -->
        <div class="admin-content">
            <div class="slider-header">
                <h2><i class="fas fa-images"></i> إدارة السلايدر</h2>
                <button class="add-slider-btn" id="showAddFormBtn">
                    <i class="fas fa-plus"></i> إضافة سلايد جديد
                </button>
            </div>
            
            <div id="slidersContainer">
                <div style="text-align: center; padding: 40px;">
                    <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--primary-blue);"></i>
                    <p>جاري التحميل...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- نافذة إضافة/تعديل سلايد -->
    <div class="slider-form-modal" id="sliderModal">
        <div class="slider-form-container">
            <div class="form-header">
                <h3 id="formTitle">إضافة سلايد جديد</h3>
                <button class="close-form" id="closeFormBtn">&times;</button>
            </div>
            <form id="sliderForm">
                <input type="hidden" id="sliderId">
                
                <div class="form-group">
                    <label><i class="fas fa-image"></i> صورة السلايد</label>
                    <div class="image-preview" id="imagePreview">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span style="display: block; font-size: 12px;">اضغط لرفع صورة</span>
                    </div>
                    <input type="file" id="sliderImage" class="product-image-input" accept="image/*">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> عنوان السلايد (اختياري)</label>
                    <input type="text" id="sliderTitle" placeholder="مثال: عرض الصيف">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-link"></i> رابط السلايد (اختياري)</label>
                    <input type="url" id="sliderLink" placeholder="https://...">
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="saveSliderBtn">
                        <i class="fas fa-save"></i> حفظ
                    </button>
                    <button type="button" class="btn btn-outline" id="cancelFormBtn">
                        <i class="fas fa-times"></i> إلغاء
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- تحميل التحميل -->
    <div class="loading-overlay" id="loadingOverlay">
        <div><i class="fas fa-spinner fa-spin"></i> جاري المعالجة...</div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>

    <!-- Firebase Config -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
            authDomain: "awlad-sh3lan-store.firebaseapp.com",
            projectId: "awlad-sh3lan-store",
            storageBucket: "awlad-sh3lan-store.firebasestorage.app",
            messagingSenderId: "77191704198",
            appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
    </script>

    <!-- Slider Script -->
    <script>
        const IMGBB_API_KEY = 'fbed47dcedc81b61a1aa27a7087d62fc';
        let currentEditId = null;
        let currentImageFile = null;
        
        // التحقق من صلاحية الأدمن
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'admin-login.html';
                return;
            }
            const adminDoc = await db.collection('admins').doc(user.uid).get();
            if (!adminDoc.exists) {
                await auth.signOut();
                window.location.href = 'admin-login.html';
                return;
            }
            loadSliders();
        });
        
        // تحميل السلايدر
        async function loadSliders() {
            try {
                const snapshot = await db.collection('sliders').orderBy('order', 'asc').get();
                const sliders = [];
                snapshot.forEach(doc => {
                    sliders.push({ id: doc.id, ...doc.data() });
                });
                displaySliders(sliders);
            } catch (error) {
                console.error('خطأ في تحميل السلايدر:', error);
                showToast('حدث خطأ في تحميل السلايدر', 'error');
            }
        }
        
        // عرض السلايدر
        function displaySliders(sliders) {
            const container = document.getElementById('slidersContainer');
            
            if (sliders.length === 0) {
                container.innerHTML = `
                    <div class="empty-sliders">
                        <i class="fas fa-images"></i>
                        <h3>لا توجد سلايدات</h3>
                        <p>اضغط على زر "إضافة سلايد جديد" لإضافة أول سلايد</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="sliders-grid">
                    ${sliders.map((slider, index) => `
                        <div class="slider-card">
                            <div class="order-badge">#${index + 1}</div>
                            <img src="${slider.image}" alt="${slider.title || 'سلايد'}" onerror="this.src='https://via.placeholder.com/400x180?text=No+Image'">
                            <div class="slider-info">
                                ${slider.title ? `<div class="slider-title">${escapeHtml(slider.title)}</div>` : ''}
                                ${slider.link ? `<a href="${slider.link}" target="_blank" class="slider-link"><i class="fas fa-external-link-alt"></i> ${slider.link.substring(0, 40)}${slider.link.length > 40 ? '...' : ''}</a>` : ''}
                                <div class="slider-actions">
                                    <button class="edit-slider" onclick="editSlider('${slider.id}')">
                                        <i class="fas fa-edit"></i> تعديل
                                    </button>
                                    <button class="delete-slider" onclick="deleteSliderHandler('${slider.id}')">
                                        <i class="fas fa-trash"></i> حذف
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // رفع صورة إلى ImgBB
        async function uploadImage(file) {
            const formData = new FormData();
            formData.append('image', file);
            formData.append('key', IMGBB_API_KEY);
            
            const response = await fetch('https://api.imgbb.com/1/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.success) {
                return data.data.url;
            }
            throw new Error('فشل رفع الصورة');
        }
        
        // حفظ سلايد
        document.getElementById('sliderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('sliderTitle').value.trim();
            const link = document.getElementById('sliderLink').value.trim();
            const sliderId = document.getElementById('sliderId').value;
            
            if (!currentImageFile && !sliderId) {
                showToast('الرجاء اختيار صورة للسلايد', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                let imageUrl = null;
                
                if (currentImageFile) {
                    imageUrl = await uploadImage(currentImageFile);
                } else if (sliderId) {
                    const existingSlider = await db.collection('sliders').doc(sliderId).get();
                    imageUrl = existingSlider.data()?.image;
                }
                
                const sliderData = {
                    title: title || '',
                    link: link || '',
                    image: imageUrl,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                if (sliderId) {
                    await db.collection('sliders').doc(sliderId).update(sliderData);
                    showToast('تم تحديث السلايد بنجاح', 'success');
                } else {
                    const sliders = await db.collection('sliders').orderBy('order', 'desc').limit(1).get();
                    let lastOrder = 0;
                    sliders.forEach(doc => {
                        if (doc.data().order) lastOrder = doc.data().order;
                    });
                    sliderData.order = lastOrder + 1;
                    sliderData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('sliders').add(sliderData);
                    showToast('تم إضافة السلايد بنجاح', 'success');
                }
                
                closeModal();
                loadSliders();
            } catch (error) {
                console.error('خطأ في حفظ السلايد:', error);
                showToast('حدث خطأ في حفظ السلايد', 'error');
            } finally {
                showLoading(false);
            }
        });
        
        // تعديل سلايد
        window.editSlider = async (id) => {
            try {
                const doc = await db.collection('sliders').doc(id).get();
                if (doc.exists) {
                    const slider = doc.data();
                    document.getElementById('sliderId').value = id;
                    document.getElementById('sliderTitle').value = slider.title || '';
                    document.getElementById('sliderLink').value = slider.link || '';
                    document.getElementById('formTitle').textContent = 'تعديل سلايد';
                    
                    if (slider.image) {
                        const preview = document.getElementById('imagePreview');
                        preview.style.backgroundImage = `url('${slider.image}')`;
                        preview.style.backgroundSize = 'cover';
                        preview.innerHTML = '';
                    }
                    
                    currentImageFile = null;
                    document.getElementById('sliderModal').style.display = 'flex';
                }
            } catch (error) {
                console.error('خطأ في جلب السلايد:', error);
                showToast('حدث خطأ', 'error');
            }
        };
        
        // حذف سلايد
        window.deleteSliderHandler = async (id) => {
            if (confirm('هل أنت متأكد من حذف هذا السلايد؟')) {
                showLoading(true);
                try {
                    await db.collection('sliders').doc(id).delete();
                    showToast('تم حذف السلايد بنجاح', 'success');
                    loadSliders();
                } catch (error) {
                    console.error('خطأ في حذف السلايد:', error);
                    showToast('حدث خطأ في حذف السلايد', 'error');
                } finally {
                    showLoading(false);
                }
            }
        };
        
        // نموذج إضافة سلايد
        document.getElementById('showAddFormBtn').addEventListener('click', () => {
            resetForm();
            document.getElementById('sliderModal').style.display = 'flex';
        });
        
        function resetForm() {
            document.getElementById('sliderId').value = '';
            document.getElementById('sliderTitle').value = '';
            document.getElementById('sliderLink').value = '';
            document.getElementById('formTitle').textContent = 'إضافة سلايد جديد';
            document.getElementById('imagePreview').style.backgroundImage = '';
            document.getElementById('imagePreview').innerHTML = '<i class="fas fa-cloud-upload-alt"></i><span style="display: block; font-size: 12px;">اضغط لرفع صورة</span>';
            currentImageFile = null;
            document.getElementById('sliderImage').value = '';
        }
        
        function closeModal() {
            document.getElementById('sliderModal').style.display = 'none';
            resetForm();
        }
        
        document.getElementById('closeFormBtn').addEventListener('click', closeModal);
        document.getElementById('cancelFormBtn').addEventListener('click', closeModal);
        
        // رفع الصورة
        document.getElementById('imagePreview').addEventListener('click', () => {
            document.getElementById('sliderImage').click();
        });
        
        document.getElementById('sliderImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                currentImageFile = file;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const preview = document.getElementById('imagePreview');
                    preview.style.backgroundImage = `url('${event.target.result}')`;
                    preview.style.backgroundSize = 'cover';
                    preview.innerHTML = '';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // تسجيل الخروج
        document.getElementById('sidebarLogout').addEventListener('click', async () => {
            await auth.signOut();
            window.location.href = 'admin-login.html';
        });
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type}`;
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.zIndex = '9999';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
