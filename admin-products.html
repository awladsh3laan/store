<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات | متجر أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f0f2f5;
        }
        
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --green-light: #90E0EF;
            --dark-bg: #1a2a3a;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header {
            background: var(--dark-bg);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .logo { font-size: 1.3rem; font-weight: 800; color: var(--gold-light); }
        .logo span { color: var(--sky-blue); }
        
        .container {
            padding: 2rem 5%;
        }
        
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 0.8rem 1.5rem;
            background: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .tab-btn.active {
            background: var(--sky-blue);
            color: white;
        }
        
        .tab-pane {
            display: none;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }
        
        .tab-pane.active { display: block; }
        
        form input, form select, form textarea {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: inherit;
        }
        
        button {
            background: var(--sky-blue);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 1rem;
        }
        
        .image-preview {
            width: 100px;
            height: 100px;
            object-fit: cover;
            margin: 0.5rem 0;
            border-radius: 10px;
        }
        
        .items-grid {
            display: grid;
            gap: 1rem;
        }
        
        .item-card {
            background: #f9f9f9;
            padding: 1rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .edit-btn, .delete-btn {
            padding: 0.5rem 1rem;
            margin: 0 0.25rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .edit-btn { background: var(--gold-dark); color: white; }
        .delete-btn { background: #dc3545; color: white; }
        
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--sky-blue);
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .item-card { flex-direction: column; gap: 0.5rem; text-align: center; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">أولاد <span>شعلان</span> | إدارة المنتجات</div>
    <button class="logout-btn" onclick="logout()" style="background:#dc3545; color:white; border:none; padding:0.5rem 1rem; border-radius:25px;"><i class="fas fa-sign-out-alt"></i> خروج</button>
</header>

<div class="container">
    <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('products')">المنتجات</button>
        <button class="tab-btn" onclick="showTab('categories')">التصنيفات</button>
        <button class="tab-btn" onclick="showTab('brands')">البراندات</button>
    </div>
    
    <!-- تبويب المنتجات -->
    <div id="productsTab" class="tab-pane active">
        <h3>إضافة منتج جديد</h3>
        <form id="productForm">
            <input type="text" id="productName" placeholder="اسم المنتج" required>
            <textarea id="productDesc" placeholder="وصف المنتج"></textarea>
            <input type="number" id="productPrice" placeholder="السعر" required>
            <input type="number" id="productDiscount" placeholder="سعر العرض (اختياري)">
            <input type="number" id="productStock" placeholder="الكمية المتاحة" required>
            <select id="productCategory" required><option value="">اختر التصنيف</option></select>
            <select id="productBrand" required><option value="">اختر البراند</option></select>
            <input type="file" id="productImage" accept="image/*">
            <img id="imagePreview" class="image-preview" style="display:none">
            <button type="submit"><i class="fas fa-save"></i> إضافة المنتج</button>
        </form>
        
        <h3 style="margin-top: 2rem;">قائمة المنتجات</h3>
        <div id="productsList" class="items-grid"></div>
    </div>
    
    <!-- تبويب التصنيفات -->
    <div id="categoriesTab" class="tab-pane">
        <h3>إضافة تصنيف جديد</h3>
        <form id="categoryForm">
            <input type="text" id="categoryName" placeholder="اسم التصنيف" required>
            <input type="file" id="categoryImage" accept="image/*">
            <img id="categoryPreview" class="image-preview" style="display:none">
            <button type="submit"><i class="fas fa-save"></i> إضافة تصنيف</button>
        </form>
        <h3 style="margin-top: 2rem;">قائمة التصنيفات</h3>
        <div id="categoriesList" class="items-grid"></div>
    </div>
    
    <!-- تبويب البراندات -->
    <div id="brandsTab" class="tab-pane">
        <h3>إضافة براند جديد</h3>
        <form id="brandForm">
            <input type="text" id="brandName" placeholder="اسم البراند" required>
            <input type="file" id="brandImage" accept="image/*">
            <img id="brandPreview" class="image-preview" style="display:none">
            <button type="submit"><i class="fas fa-save"></i> إضافة براند</button>
        </form>
        <h3 style="margin-top: 2rem;">قائمة البراندات</h3>
        <div id="brandsList" class="items-grid"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
        authDomain: "awlad-sh3lan-store.firebaseapp.com",
        projectId: "awlad-sh3lan-store",
        storageBucket: "awlad-sh3lan-store.firebasestorage.app",
        messagingSenderId: "77191704198",
        appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    const IMGBB_API_KEY = "99506f7c2987acaf6709c7fb0e978298";
    
    // التحقق من تسجيل الدخول
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'admin-login.html'; return; }
        const adminDoc = await db.collection('admins').doc(user.uid).get();
        if (!adminDoc.exists) { await auth.signOut(); window.location.href = 'admin-login.html'; return; }
        loadProducts();
        loadCategories();
        loadBrands();
        loadCategorySelect();
        loadBrandSelect();
    });
    
    // رفع الصور لـ ImgBB
    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append("image", file);
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
        const data = await response.json();
        if (data.success) return data.data.url;
        throw new Error("فشل رفع الصورة");
    }
    
    // معاينة الصورة قبل الرفع
    function previewImage(input, previewId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { document.getElementById(previewId).style.display = 'block'; document.getElementById(previewId).src = e.target.result; };
            reader.readAsDataURL(input.files[0]);
        }
    }
    
    document.getElementById('productImage')?.addEventListener('change', (e) => previewImage(e.target, 'imagePreview'));
    document.getElementById('categoryImage')?.addEventListener('change', (e) => previewImage(e.target, 'categoryPreview'));
    document.getElementById('brandImage')?.addEventListener('change', (e) => previewImage(e.target, 'brandPreview'));
    
    // تحميل التصنيفات في السيلكت
    async function loadCategorySelect() {
        const snapshot = await db.collection('categories').get();
        const select = document.getElementById('productCategory');
        select.innerHTML = '<option value="">اختر التصنيف</option>' + snapshot.docs.map(doc => `<option value="${doc.id}">${doc.data().name}</option>`).join('');
    }
    
    async function loadBrandSelect() {
        const snapshot = await db.collection('brands').get();
        const select = document.getElementById('productBrand');
        select.innerHTML = '<option value="">اختر البراند</option>' + snapshot.docs.map(doc => `<option value="${doc.id}">${doc.data().name}</option>`).join('');
    }
    
    // إضافة منتج
    document.getElementById('productForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const imageFile = document.getElementById('productImage').files[0];
        let imageUrl = '';
        if (imageFile) imageUrl = await uploadToImgBB(imageFile);
        
        await db.collection('products').add({
            name: document.getElementById('productName').value,
            description: document.getElementById('productDesc').value,
            price: parseFloat(document.getElementById('productPrice').value),
            discountPrice: document.getElementById('productDiscount').value ? parseFloat(document.getElementById('productDiscount').value) : null,
            stock: parseInt(document.getElementById('productStock').value),
            categoryId: document.getElementById('productCategory').value,
            brandId: document.getElementById('productBrand').value,
            imageUrl: imageUrl,
            createdAt: new Date().toISOString()
        });
        alert('تم إضافة المنتج');
        document.getElementById('productForm').reset();
        document.getElementById('imagePreview').style.display = 'none';
        loadProducts();
    });
    
    // إضافة تصنيف
    document.getElementById('categoryForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const imageFile = document.getElementById('categoryImage').files[0];
        let imageUrl = '';
        if (imageFile) imageUrl = await uploadToImgBB(imageFile);
        
        await db.collection('categories').add({
            name: document.getElementById('categoryName').value,
            imageUrl: imageUrl
        });
        alert('تم إضافة التصنيف');
        document.getElementById('categoryForm').reset();
        document.getElementById('categoryPreview').style.display = 'none';
        loadCategories();
        loadCategorySelect();
    });
    
    // إضافة براند
    document.getElementById('brandForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const imageFile = document.getElementById('brandImage').files[0];
        let imageUrl = '';
        if (imageFile) imageUrl = await uploadToImgBB(imageFile);
        
        await db.collection('brands').add({
            name: document.getElementById('brandName').value,
            imageUrl: imageUrl
        });
        alert('تم إضافة البراند');
        document.getElementById('brandForm').reset();
        document.getElementById('brandPreview').style.display = 'none';
        loadBrands();
        loadBrandSelect();
    });
    
    // عرض المنتجات
    async function loadProducts() {
        const snapshot = await db.collection('products').get();
        const container = document.getElementById('productsList');
        if (!container) return;
        container.innerHTML = '';
        for (const doc of snapshot.docs) {
            const p = doc.data();
            let categoryName = '', brandName = '';
            const catDoc = await db.collection('categories').doc(p.categoryId).get();
            if (catDoc.exists) categoryName = catDoc.data().name;
            const brandDoc = await db.collection('brands').doc(p.brandId).get();
            if (brandDoc.exists) brandName = brandDoc.data().name;
            
            container.innerHTML += `
                <div class="item-card">
                    <div><strong>${p.name}</strong><br>${p.price} جنيه | التصنيف: ${categoryName} | البراند: ${brandName}</div>
                    <div>
                        <button class="edit-btn" onclick="editProduct('${doc.id}')"><i class="fas fa-edit"></i> تعديل</button>
                        <button class="delete-btn" onclick="deleteProduct('${doc.id}')"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                </div>
            `;
        }
    }
    
    async function deleteProduct(id) {
        if (confirm('هل أنت متأكد؟')) {
            await db.collection('products').doc(id).delete();
            loadProducts();
        }
    }
    
    function editProduct(id) {
        alert(`تعديل المنتج ${id} - سيتم إضافة نافذة تعديل قريباً`);
    }
    
    // عرض التصنيفات
    async function loadCategories() {
        const snapshot = await db.collection('categories').get();
        const container = document.getElementById('categoriesList');
        if (!container) return;
        container.innerHTML = snapshot.docs.map(doc => `
            <div class="item-card">
                <div><strong>${doc.data().name}</strong></div>
                <div><button class="delete-btn" onclick="deleteCategory('${doc.id}')">حذف</button></div>
            </div>
        `).join('');
    }
    
    async function deleteCategory(id) {
        if (confirm('هل أنت متأكد؟')) { await db.collection('categories').doc(id).delete(); loadCategories(); loadCategorySelect(); }
    }
    
    // عرض البراندات
    async function loadBrands() {
        const snapshot = await db.collection('brands').get();
        const container = document.getElementById('brandsList');
        if (!container) return;
        container.innerHTML = snapshot.docs.map(doc => `
            <div class="item-card">
                <div><strong>${doc.data().name}</strong></div>
                <div><button class="delete-btn" onclick="deleteBrand('${doc.id}')">حذف</button></div>
            </div>
        `).join('');
    }
    
    async function deleteBrand(id) {
        if (confirm('هل أنت متأكد؟')) { await db.collection('brands').doc(id).delete(); loadBrands(); loadBrandSelect(); }
    }
    
    function showTab(tab) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if (tab === 'products') { document.getElementById('productsTab').classList.add('active'); document.querySelector('.tab-btn').classList.add('active'); }
        else if (tab === 'categories') { document.getElementById('categoriesTab').classList.add('active'); document.querySelectorAll('.tab-btn')[1].classList.add('active'); loadCategories(); }
        else if (tab === 'brands') { document.getElementById('brandsTab').classList.add('active'); document.querySelectorAll('.tab-btn')[2].classList.add('active'); loadBrands(); }
    }
    
    window.deleteProduct = deleteProduct;
    window.editProduct = editProduct;
    window.deleteCategory = deleteCategory;
    window.deleteBrand = deleteBrand;
    window.showTab = showTab;
    
    async function logout() { await auth.signOut(); window.location.href = 'admin-login.html'; }
    window.logout = logout;
</script>

</body>
</html>
