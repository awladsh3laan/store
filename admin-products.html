<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات - متجر أولاد شعلان</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <!-- Style -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* استايلات إدارة المنتجات */
        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .add-product-btn {
            background: var(--success-green);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: bold;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        
        .search-box input {
            padding: 12px 20px;
            border: 2px solid #E0E0E0;
            border-radius: 30px;
            width: 250px;
        }
        
        .search-box button {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        
        /* نموذج إضافة/تعديل منتج */
        .product-form-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .product-form-container {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }
        
        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #EEE;
        }
        
        .form-header h3 {
            color: var(--primary-dark);
        }
        
        .close-form {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--gray-text);
        }
        
        .image-preview {
            width: 100%;
            height: 200px;
            border: 2px dashed #E0E0E0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .image-preview:hover {
            border-color: var(--primary-blue);
        }
        
        .image-preview i {
            font-size: 40px;
            color: var(--gray-text);
        }
        
        .product-image-input {
            display: none;
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .form-actions button {
            flex: 1;
        }
        
        /* أزرار الإجراءات في الجدول */
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .edit-btn {
            background: var(--secondary-gold);
            color: var(--primary-dark);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .delete-btn {
            background: var(--danger-red);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .product-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- الشريط الجانبي -->
        <div class="admin-sidebar">
            <h3><i class="fas fa-store"></i> متجر أولاد شعلان</h3>
            <a href="admin-dashboard.html"><i class="fas fa-chart-line"></i> لوحة التحكم</a>
            <a href="admin-products.html" class="active"><i class="fas fa-box"></i> المنتجات</a>
            <a href="admin-slider.html"><i class="fas fa-images"></i> السلايدر</a>
            <a href="admin-shipping.html"><i class="fas fa-truck"></i> الشحن</a>
            <a href="admin-orders.html"><i class="fas fa-list"></i> الطلبات</a>
            <a href="#" id="sidebarLogout"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</a>
        </div>
        
        <!-- المحتوى الرئيسي -->
        <div class="admin-content">
            <div class="products-header">
                <h2><i class="fas fa-box"></i> إدارة المنتجات</h2>
                <div style="display: flex; gap: 15px;">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="بحث عن منتج...">
                        <button id="searchBtn"><i class="fas fa-search"></i></button>
                    </div>
                    <button class="add-product-btn" id="showAddFormBtn">
                        <i class="fas fa-plus"></i> إضافة منتج جديد
                    </button>
                </div>
            </div>
            
            <div style="overflow-x: auto;">
                <table class="data-table" id="productsTable">
                    <thead>
                        <tr>
                            <th>الصورة</th>
                            <th>الاسم</th>
                            <th>السعر</th>
                            <th>الوصف</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="productsList">
                        <tr>
                            <td colspan="5" style="text-align: center;">جاري التحميل...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- نافذة إضافة/تعديل منتج -->
    <div class="product-form-modal" id="productModal">
        <div class="product-form-container">
            <div class="form-header">
                <h3 id="formTitle">إضافة منتج جديد</h3>
                <button class="close-form" id="closeFormBtn">&times;</button>
            </div>
            <form id="productForm">
                <input type="hidden" id="productId">
                
                <div class="form-group">
                    <label><i class="fas fa-image"></i> صورة المنتج</label>
                    <div class="image-preview" id="imagePreview">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span style="display: block; font-size: 12px;">اضغط لرفع صورة</span>
                    </div>
                    <input type="file" id="productImage" class="product-image-input" accept="image/*">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> اسم المنتج</label>
                    <input type="text" id="productName" required placeholder="مثال: تيشيرت قطني">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-money-bill-wave"></i> السعر (ج.م)</label>
                    <input type="number" id="productPrice" required placeholder="مثال: 250">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-align-right"></i> وصف المنتج</label>
                    <textarea id="productDescription" rows="4" placeholder="وصف المنتج بالتفصيل..."></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="saveProductBtn">
                        <i class="fas fa-save"></i> حفظ
                    </button>
                    <button type="button" class="btn btn-outline" id="cancelFormBtn">
                        <i class="fas fa-times"></i> إلغاء
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- تحميل التحميل -->
    <div class="loading-overlay" id="loadingOverlay">
        <div><i class="fas fa-spinner fa-spin"></i> جاري المعالجة...</div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>

    <!-- Firebase Config -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
            authDomain: "awlad-sh3lan-store.firebaseapp.com",
            projectId: "awlad-sh3lan-store",
            storageBucket: "awlad-sh3lan-store.firebasestorage.app",
            messagingSenderId: "77191704198",
            appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
    </script>

    <!-- Products Script -->
    <script>
        const IMGBB_API_KEY = 'fbed47dcedc81b61a1aa27a7087d62fc';
        let currentEditId = null;
        let currentImageFile = null;
        
        // التحقق من صلاحية الأدمن
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'admin-login.html';
                return;
            }
            const adminDoc = await db.collection('admins').doc(user.uid).get();
            if (!adminDoc.exists) {
                await auth.signOut();
                window.location.href = 'admin-login.html';
                return;
            }
            loadProducts();
        });
        
        // تحميل المنتجات
        async function loadProducts(searchTerm = '') {
            try {
                let query = db.collection('products').orderBy('createdAt', 'desc');
                const snapshot = await query.get();
                let products = [];
                snapshot.forEach(doc => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                
                if (searchTerm) {
                    products = products.filter(p => 
                        p.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        (p.description && p.description.toLowerCase().includes(searchTerm.toLowerCase()))
                    );
                }
                
                displayProducts(products);
            } catch (error) {
                console.error('خطأ في تحميل المنتجات:', error);
                showToast('حدث خطأ في تحميل المنتجات', 'error');
            }
        }
        
        // عرض المنتجات في الجدول
        function displayProducts(products) {
            const tbody = document.getElementById('productsList');
            
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">لا توجد منتجات</td></tr>';
                return;
            }
            
            tbody.innerHTML = products.map(product => `
                <tr>
                    <td><img src="${product.image}" class="product-img" onerror="this.src='https://via.placeholder.com/50'"></td>
                    <td><strong>${escapeHtml(product.name)}</strong></td>
                    <td style="color: var(--success-green); font-weight: bold;">${product.price.toLocaleString()} ج.م</td>
                    <td>${product.description ? escapeHtml(product.description.substring(0, 50)) + (product.description.length > 50 ? '...' : '') : '-'}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="edit-btn" onclick="editProduct('${product.id}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="delete-btn" onclick="deleteProductHandler('${product.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        // رفع صورة إلى ImgBB
        async function uploadImage(file) {
            const formData = new FormData();
            formData.append('image', file);
            formData.append('key', IMGBB_API_KEY);
            
            const response = await fetch('https://api.imgbb.com/1/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.success) {
                return data.data.url;
            }
            throw new Error('فشل رفع الصورة');
        }
        
        // حفظ منتج (إضافة أو تعديل)
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('productName').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            const description = document.getElementById('productDescription').value.trim();
            const productId = document.getElementById('productId').value;
            
            if (!name || !price) {
                showToast('الرجاء إدخال اسم المنتج والسعر', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                let imageUrl = null;
                
                if (currentImageFile) {
                    imageUrl = await uploadImage(currentImageFile);
                } else if (productId) {
                    const existingProduct = await db.collection('products').doc(productId).get();
                    imageUrl = existingProduct.data()?.image;
                }
                
                if (!imageUrl && !productId) {
                    showToast('الرجاء اختيار صورة للمنتج', 'error');
                    showLoading(false);
                    return;
                }
                
                const productData = {
                    name,
                    price,
                    description: description || '',
                    image: imageUrl,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                if (productId) {
                    await db.collection('products').doc(productId).update(productData);
                    showToast('تم تحديث المنتج بنجاح', 'success');
                } else {
                    productData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('products').add(productData);
                    showToast('تم إضافة المنتج بنجاح', 'success');
                }
                
                closeModal();
                loadProducts();
            } catch (error) {
                console.error('خطأ في حفظ المنتج:', error);
                showToast('حدث خطأ في حفظ المنتج', 'error');
            } finally {
                showLoading(false);
            }
        });
        
        // تعديل منتج
        window.editProduct = async (id) => {
            try {
                const doc = await db.collection('products').doc(id).get();
                if (doc.exists) {
                    const product = doc.data();
                    document.getElementById('productId').value = id;
                    document.getElementById('productName').value = product.name;
                    document.getElementById('productPrice').value = product.price;
                    document.getElementById('productDescription').value = product.description || '';
                    document.getElementById('formTitle').textContent = 'تعديل منتج';
                    
                    if (product.image) {
                        const preview = document.getElementById('imagePreview');
                        preview.style.backgroundImage = `url('${product.image}')`;
                        preview.style.backgroundSize = 'cover';
                        preview.innerHTML = '';
                    }
                    
                    currentImageFile = null;
                    document.getElementById('productModal').style.display = 'flex';
                }
            } catch (error) {
                console.error('خطأ في جلب المنتج:', error);
                showToast('حدث خطأ', 'error');
            }
        };
        
        // حذف منتج
        window.deleteProductHandler = async (id) => {
            if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                showLoading(true);
                try {
                    await db.collection('products').doc(id).delete();
                    showToast('تم حذف المنتج بنجاح', 'success');
                    loadProducts();
                } catch (error) {
                    console.error('خطأ في حذف المنتج:', error);
                    showToast('حدث خطأ في حذف المنتج', 'error');
                } finally {
                    showLoading(false);
                }
            }
        };
        
        // البحث
        document.getElementById('searchBtn').addEventListener('click', () => {
            const searchTerm = document.getElementById('searchInput').value;
            loadProducts(searchTerm);
        });
        
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadProducts(e.target.value);
            }
        });
        
        // نافذة إضافة منتج
        document.getElementById('showAddFormBtn').addEventListener('click', () => {
            resetForm();
            document.getElementById('productModal').style.display = 'flex';
        });
        
        function resetForm() {
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productDescription').value = '';
            document.getElementById('formTitle').textContent = 'إضافة منتج جديد';
            document.getElementById('imagePreview').style.backgroundImage = '';
            document.getElementById('imagePreview').innerHTML = '<i class="fas fa-cloud-upload-alt"></i><span style="display: block; font-size: 12px;">اضغط لرفع صورة</span>';
            currentImageFile = null;
            document.getElementById('productImage').value = '';
        }
        
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
            resetForm();
        }
        
        document.getElementById('closeFormBtn').addEventListener('click', closeModal);
        document.getElementById('cancelFormBtn').addEventListener('click', closeModal);
        
        // رفع الصورة
        document.getElementById('imagePreview').addEventListener('click', () => {
            document.getElementById('productImage').click();
        });
        
        document.getElementById('productImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                currentImageFile = file;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const preview = document.getElementById('imagePreview');
                    preview.style.backgroundImage = `url('${event.target.result}')`;
                    preview.style.backgroundSize = 'cover';
                    preview.innerHTML = '';
                };
                reader.readAsDataURL(file);
            }
        });
        
        // تسجيل الخروج
        document.getElementById('sidebarLogout').addEventListener('click', async () => {
            await auth.signOut();
            window.location.href = 'admin-login.html';
        });
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type}`;
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.zIndex = '9999';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
