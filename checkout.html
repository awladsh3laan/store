<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الدفع | أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --green-light: #90E0EF;
            --dark-bg: #1a2a3a;
            --shadow: 0 8px 30px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }
        .header {
            background: var(--dark-bg);
            color: white;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .logo-img { height: 40px; width: auto; max-width: 140px; object-fit: contain; }
        .back-link { color: white; text-decoration: none; }
        .back-link:hover { color: var(--gold-light); }

        .container { padding: 2rem 5%; max-width: 1100px; margin: 0 auto; }
        .page-title { color: var(--dark-bg); font-size: 1.8rem; margin-bottom: 1.5rem; }
        .page-title i { color: var(--gold-dark); }

        .checkout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .card { background: white; border-radius: 25px; padding: 1.5rem; box-shadow: var(--shadow); }
        .card h3 { color: var(--gold-dark); margin-bottom: 1rem; border-right: 4px solid var(--sky-blue); padding-right: 0.8rem; }

        input, select, textarea {
            width: 100%;
            padding: 0.7rem;
            margin: 0.4rem 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--sky-blue); outline: none; }

        .payment-opt {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin: 0.3rem 0;
            cursor: pointer;
            transition: var(--transition);
        }
        .payment-opt:hover { border-color: var(--sky-blue); background: #f9f9f9; }
        .payment-opt input { width: auto; margin: 0; }

        .payment-detail { display: none; background: #f9f9f9; padding: 0.8rem; border-radius: 12px; margin-top: 0.5rem; }
        .payment-detail.show { display: block; }

        .order-summary { background: #f9f9f9; padding: 1rem; border-radius: 15px; margin: 1rem 0; }
        .order-item { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid #eee; }
        .total-display { font-size: 1.3rem; font-weight: 700; color: var(--gold-dark); text-align: left; margin-top: 0.5rem; }
        .confirm-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--sky-blue), var(--green-light));
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }
        .confirm-btn:hover { transform: scale(1.02); }

        .tracking-result { text-align: center; background: linear-gradient(135deg, var(--gold-dark), var(--gold-light)); color: white; padding: 1.5rem; border-radius: 20px; margin-top: 1rem; }
        .tracking-result h3 { margin-bottom: 0.3rem; }
        .tracking-code { font-size: 1.6rem; font-weight: 800; letter-spacing: 2px; direction: ltr; }
        .copy-btn { background: white; color: var(--gold-dark); border: none; padding: 0.4rem 1.5rem; border-radius: 25px; cursor: pointer; margin-top: 0.5rem; font-weight: 600; }

        .footer { background: var(--dark-bg); color: white; padding: 2rem 5%; text-align: center; margin-top: 3rem; }

        @media (max-width: 768px) {
            .checkout-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<header class="header">
    <img src="https://i.servimg.com/u/f54/18/11/62/61/tm/picsar12.png" alt="أولاد شعلان" class="logo-img">
    <a href="store.html" class="back-link"><i class="fas fa-arrow-left"></i> العودة للمتجر</a>
</header>

<div class="container">
    <h1 class="page-title"><i class="fas fa-shopping-cart"></i> إتمام الشراء</h1>

    <div class="checkout-grid">
        <!-- بيانات العميل -->
        <div class="card">
            <h3><i class="fas fa-user"></i> بيانات العميل</h3>
            <input type="text" id="custName" placeholder="الاسم (حروف فقط)" required>
            <input type="tel" id="custPhone" placeholder="رقم الهاتف (11 رقم)" required>
            <textarea id="custAddress" rows="2" placeholder="العنوان بالكامل" required></textarea>

            <h3 style="margin-top:1.5rem;"><i class="fas fa-money-bill"></i> طريقة الدفع</h3>
            <div class="payment-opt" onclick="selectPayment('cash')">
                <input type="radio" name="payment" value="cash" id="cashRadio">
                <label>الدفع عند الاستلام</label>
            </div>
            <div class="payment-opt" onclick="selectPayment('instapay')">
                <input type="radio" name="payment" value="instapay" id="instapayRadio">
                <label>الدفع عبر إنستاباي</label>
            </div>
            <div id="instapayDetail" class="payment-detail">
                <p><i class="fab fa-instalod"></i> رقم إنستاباي: <strong>01063835028</strong></p>
            </div>
            <div class="payment-opt" onclick="selectPayment('wallet')">
                <input type="radio" name="payment" value="wallet" id="walletRadio">
                <label>الدفع عبر المحفظة (+5 جنيه رسوم)</label>
            </div>
            <div id="walletDetail" class="payment-detail">
                <select id="walletType">
                    <option value="etisalat">📱 إي أند كاش: 01120282953</option>
                    <option value="vodafone">📱 فودافون كاش: 01068385028</option>
                </select>
            </div>

            <h3 style="margin-top:1.5rem;"><i class="fas fa-headset"></i> طريقة التواصل للتأكيد</h3>
            <div class="payment-opt" onclick="selectContact('call')">
                <input type="radio" name="contact" value="call" id="callRadio">
                <label><i class="fas fa-phone"></i> مكالمة هاتفية</label>
            </div>
            <div class="payment-opt" onclick="selectContact('whatsapp')">
                <input type="radio" name="contact" value="whatsapp" id="whatsappRadio">
                <label><i class="fab fa-whatsapp"></i> واتساب</label>
            </div>
        </div>

        <!-- ملخص الطلب -->
        <div class="card">
            <h3><i class="fas fa-receipt"></i> ملخص الطلب</h3>
            <div id="summary" class="order-summary"></div>
            <div id="extraFees"></div>
            <div id="totalAmount" class="total-display"></div>
            <button class="confirm-btn" onclick="confirmOrder()"><i class="fas fa-check-circle"></i> تأكيد الطلب</button>
            <div id="resultMessage"></div>
        </div>
    </div>
</div>

<footer class="footer">
    <p>© 2026 متجر أولاد شعلان - جميع الحقوق محفوظة</p>
</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
        authDomain: "awlad-sh3lan-store.firebaseapp.com",
        projectId: "awlad-sh3lan-store",
        storageBucket: "awlad-sh3lan-store.firebasestorage.app",
        messagingSenderId: "77191704198",
        appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let selectedPayment = null;
    let selectedContact = null;
    let walletFee = 0;

    function renderSummary() {
        const container = document.getElementById('summary');
        let subtotal = 0;
        container.innerHTML = cart.map(item => {
            subtotal += item.price * item.quantity;
            return `<div class="order-item"><span>${item.name} × ${item.quantity}</span><span>${(item.price * item.quantity).toFixed(2)} ج</span></div>`;
        }).join('');

        const feeContainer = document.getElementById('extraFees');
        if (selectedPayment === 'wallet') {
            walletFee = 5;
            feeContainer.innerHTML = `<div class="order-item" style="color:var(--gold-dark);"><span>رسوم سحب المحفظة</span><span>5 ج</span></div>`;
        } else {
            walletFee = 0;
            feeContainer.innerHTML = '';
        }

        const total = subtotal + walletFee;
        document.getElementById('totalAmount').innerHTML = `الإجمالي: ${total.toFixed(2)} جنيه`;
        return { subtotal, total };
    }

    function selectPayment(method) {
        selectedPayment = method;
        document.getElementById('instapayDetail').classList.toggle('show', method === 'instapay');
        document.getElementById('walletDetail').classList.toggle('show', method === 'wallet');
        renderSummary();
    }

    function selectContact(method) {
        selectedContact = method;
    }

    function validate() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const address = document.getElementById('custAddress').value.trim();

        if (!name || !/^[A-Za-z\u0600-\u06FF\s]+$/.test(name)) { alert('الرجاء إدخال اسم صحيح (حروف فقط)'); return false; }
        if (!phone || !/^\d{11}$/.test(phone)) { alert('الرجاء إدخال رقم هاتف صحيح (11 رقم)'); return false; }
        if (!address) { alert('الرجاء إدخال العنوان'); return false; }
        if (!selectedPayment) { alert('الرجاء اختيار طريقة الدفع'); return false; }
        if (!selectedContact) { alert('الرجاء اختيار طريقة التواصل'); return false; }
        if (cart.length === 0) { alert('السلة فارغة'); return false; }
        return true;
    }

    function generateTracking() {
        return 'ORD-' + Math.random().toString(36).substring(2, 10).toUpperCase();
    }

    async function confirmOrder() {
        if (!validate()) return;

        const tracking = generateTracking();
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const address = document.getElementById('custAddress').value;
        const walletType = document.getElementById('walletType')?.value || null;
        const { total } = renderSummary();

        const order = {
            trackingCode: tracking,
            customerName: name,
            phone: phone,
            address: address,
            items: cart,
            paymentMethod: selectedPayment,
            walletType: walletType,
            contactMethod: selectedContact,
            totalAmount: total,
            status: 'قيد المراجعة',
            createdAt: new Date().toISOString()
        };

        await db.collection('orders').add(order);

        document.getElementById('resultMessage').innerHTML = `
            <div class="tracking-result">
                <i class="fas fa-check-circle" style="font-size:2.5rem;"></i>
                <h3>✅ تم استلام طلبك!</h3>
                <p>رقم تتبع الطلب:</p>
                <div class="tracking-code">${tracking}</div>
                <button class="copy-btn" onclick="copyCode('${tracking}')"><i class="fas fa-copy"></i> نسخ</button>
                <p style="margin-top:0.5rem;font-size:0.85rem;opacity:0.8;">
                    يمكنك متابعة طلبك في <a href="track-order.html" style="color:white;text-decoration:underline;">تتبع الطلبات</a>
                </p>
            </div>
        `;

        localStorage.removeItem('cart');
        cart = [];
        renderSummary();

        if (selectedPayment === 'wallet' || selectedPayment === 'instapay') {
            alert(`يرجى تحويل المبلغ ${total} جنيه إلى الرقم المحدد ثم تواصل معنا للتأكيد`);
        }
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code);
        alert('✅ تم نسخ كود التتبع: ' + code);
    }

    renderSummary();
    window.selectPayment = selectPayment;
    window.selectContact = selectContact;
    window.confirmOrder = confirmOrder;
    window.copyCode = copyCode;
</script>

</body>
</html>
