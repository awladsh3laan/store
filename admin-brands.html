<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة البراندات | أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --dark-bg: #1a2a3a;
            --shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .header {
            background: var(--dark-bg);
            color: white;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo-img { height: 40px; width: auto; max-width: 140px; object-fit: contain; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 0.4rem 1.2rem; border-radius: 25px; cursor: pointer; }
        .container { padding: 1.5rem 5%; }
        .back-link { display: inline-block; margin-bottom: 1rem; color: var(--sky-blue); text-decoration: none; }
        .card { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
        .card h3 { margin-bottom: 1rem; color: var(--gold-dark); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-grid input, .form-grid textarea { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        .form-grid .full { grid-column: 1 / -1; }
        .btn { padding: 0.7rem 1.5rem; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--sky-blue); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-sm { padding: 0.2rem 0.8rem; border: none; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .image-preview { max-width: 100px; max-height: 80px; object-fit: cover; border-radius: 10px; margin-top: 0.5rem; }
        .brand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
        .brand-card { background: #f9f9f9; border-radius: 15px; padding: 1rem; text-align: center; transition: all 0.3s; }
        .brand-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
        .brand-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; margin-bottom: 0.5rem; }
        .brand-card h4 { font-size: 0.95rem; margin-bottom: 0.2rem; }
        .brand-card p { font-size: 0.75rem; color: #888; }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
            .brand-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header class="header">
    <img src="https://i.servimg.com/u/f54/18/11/62/61/tm/picsar12.png" alt="أولاد شعلان" class="logo-img">
    <div><span style="color:var(--gold-light);">إدارة البراندات</span> <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button></div>
</header>

<div class="container">
    <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>

    <div class="card">
        <h3><i class="fas fa-plus-circle"></i> إضافة براند جديد</h3>
        <form id="brandForm" class="form-grid">
            <input type="text" id="bName" placeholder="اسم البراند" required>
            <div class="full"><textarea id="bDesc" rows="2" placeholder="وصف مختصر (اختياري)"></textarea></div>
            <div class="full">
                <input type="file" id="bImage" accept="image/*">
                <img id="bPreview" class="image-preview" style="display:none;">
            </div>
            <div class="full"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> إضافة براند</button></div>
        </form>
    </div>

    <div class="card">
        <h3><i class="fas fa-building"></i> قائمة البراندات</h3>
        <div id="brandsList" class="brand-grid"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
        authDomain: "awlad-sh3lan-store.firebaseapp.com",
        projectId: "awlad-sh3lan-store",
        storageBucket: "awlad-sh3lan-store.firebasestorage.app",
        messagingSenderId: "77191704198",
        appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const IMGBB_API_KEY = "99506f7c2987acaf6709c7fb0e978298";

    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'admin.html'; return; }
        const adminDoc = await db.collection('admins').doc(user.uid).get();
        if (!adminDoc.exists) { await auth.signOut(); window.location.href = 'admin.html'; return; }
        loadBrands();
    });

    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append("image", file);
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
        const data = await response.json();
        if (data.success) return data.data.url;
        throw new Error("فشل رفع الصورة");
    }

    document.getElementById('bImage')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) { const reader = new FileReader(); reader.onload = (ev) => { document.getElementById('bPreview').style.display = 'block'; document.getElementById('bPreview').src = ev.target.result; }; reader.readAsDataURL(file); }
    });

    document.getElementById('brandForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        let imageUrl = '';
        const file = document.getElementById('bImage').files[0];
        if (file) imageUrl = await uploadToImgBB(file);
        await db.collection('brands').add({
            name: document.getElementById('bName').value,
            description: document.getElementById('bDesc').value,
            imageUrl: imageUrl,
            createdAt: new Date().toISOString()
        });
        alert('✅ تم إضافة البراند');
        document.getElementById('brandForm').reset();
        document.getElementById('bPreview').style.display = 'none';
        loadBrands();
    });

    async function loadBrands() {
        const snapshot = await db.collection('brands').get();
        const container = document.getElementById('brandsList');
        container.innerHTML = snapshot.docs.map(doc => {
            const b = doc.data();
            return `
                <div class="brand-card">
                    ${b.imageUrl ? `<img src="${b.imageUrl}" alt="${b.name}">` : '<i class="fas fa-store" style="font-size:3rem;color:#ccc;display:block;margin:0.5rem 0;"></i>'}
                    <h4>${b.name}</h4>
                    ${b.description ? `<p>${b.description}</p>` : ''}
                    <button class="btn-sm btn-danger" onclick="deleteBrand('${doc.id}')" style="margin-top:0.5rem;"><i class="fas fa-trash"></i></button>
                </div>
            `;
        }).join('');
    }

    async function deleteBrand(id) {
        if (confirm('هل أنت متأكد من حذف هذا البراند؟')) {
            await db.collection('brands').doc(id).delete();
            loadBrands();
        }
    }

    async function logout() { await auth.signOut(); window.location.href = 'admin.html'; }

    window.deleteBrand = deleteBrand;
    window.logout = logout;
</script>

</body>
</html>
