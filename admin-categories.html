<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة التصنيفات | أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --dark-bg: #1a2a3a;
            --shadow: 0 8px 25px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
        }
        .header {
            background: var(--dark-bg);
            color: white;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo-img { height: 40px; width: auto; max-width: 140px; object-fit: contain; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 0.4rem 1.2rem; border-radius: 25px; cursor: pointer; }
        .container { padding: 1.5rem 5%; }
        .back-link { display: inline-block; margin-bottom: 1rem; color: var(--sky-blue); text-decoration: none; }
        .card { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
        .card h3 { margin-bottom: 1rem; color: var(--gold-dark); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-grid input, .form-grid select { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        .form-grid .full { grid-column: 1 / -1; }
        .btn { padding: 0.7rem 1.5rem; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--sky-blue); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .image-preview { max-width: 100px; max-height: 80px; object-fit: cover; border-radius: 10px; margin-top: 0.5rem; }
        .tree { list-style: none; padding-right: 1.5rem; }
        .tree li { padding: 0.5rem 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .tree .sub { padding-right: 2rem; border-right: 2px solid var(--sky-blue); margin-top: 0.3rem; }
        .brands-inline { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.3rem 0; }
        .brand-chip { background: var(--sky-blue); color: white; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.8rem; }
        .btn-sm { padding: 0.2rem 0.8rem; border: none; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<header class="header">
    <img src="https://i.servimg.com/u/f54/18/11/62/61/tm/picsar12.png" alt="أولاد شعلان" class="logo-img">
    <div><span style="color:var(--gold-light);">إدارة التصنيفات</span> <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button></div>
</header>

<div class="container">
    <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>

    <div class="card">
        <h3><i class="fas fa-plus-circle"></i> إضافة تصنيف جديد</h3>
        <form id="categoryForm" class="form-grid">
            <input type="text" id="cName" placeholder="اسم التصنيف" required>
            <select id="cParent">
                <option value="">تصنيف رئيسي</option>
            </select>
            <div class="full">
                <input type="file" id="cImage" accept="image/*">
                <img id="cPreview" class="image-preview" style="display:none;">
            </div>
            <div class="full"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> إضافة تصنيف</button></div>
        </form>
    </div>

    <div class="card">
        <h3><i class="fas fa-tree"></i> هيكل التصنيفات</h3>
        <div id="categoriesTree"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
        authDomain: "awlad-sh3lan-store.firebaseapp.com",
        projectId: "awlad-sh3lan-store",
        storageBucket: "awlad-sh3lan-store.firebasestorage.app",
        messagingSenderId: "77191704198",
        appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const IMGBB_API_KEY = "99506f7c2987acaf6709c7fb0e978298";

    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'admin.html'; return; }
        const adminDoc = await db.collection('admins').doc(user.uid).get();
        if (!adminDoc.exists) { await auth.signOut(); window.location.href = 'admin.html'; return; }
        loadCategories();
        loadParentSelect();
    });

    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append("image", file);
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
        const data = await response.json();
        if (data.success) return data.data.url;
        throw new Error("فشل رفع الصورة");
    }

    document.getElementById('cImage')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) { const reader = new FileReader(); reader.onload = (ev) => { document.getElementById('cPreview').style.display = 'block'; document.getElementById('cPreview').src = ev.target.result; }; reader.readAsDataURL(file); }
    });

    async function loadParentSelect() {
        const snapshot = await db.collection('categories').get();
        const options = snapshot.docs.filter(d => !d.data().parentId).map(d => `<option value="${d.id}">${d.data().name}</option>`).join('');
        document.getElementById('cParent').innerHTML = '<option value="">تصنيف رئيسي</option>' + options;
    }

    document.getElementById('categoryForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        let imageUrl = '';
        const file = document.getElementById('cImage').files[0];
        if (file) imageUrl = await uploadToImgBB(file);
        await db.collection('categories').add({
            name: document.getElementById('cName').value,
            parentId: document.getElementById('cParent').value || null,
            imageUrl: imageUrl
        });
        alert('✅ تم إضافة التصنيف');
        document.getElementById('categoryForm').reset();
        document.getElementById('cPreview').style.display = 'none';
        loadCategories();
        loadParentSelect();
    });

    async function loadCategories() {
        const snapshot = await db.collection('categories').get();
        const all = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        const tree = buildTree(all);
        document.getElementById('categoriesTree').innerHTML = renderTree(tree);
    }

    function buildTree(items, parentId = null) {
        return items.filter(i => i.parentId === parentId || (!i.parentId && !parentId)).map(item => ({
            ...item,
            children: buildTree(items, item.id)
        }));
    }

    function renderTree(nodes) {
        if (!nodes || !nodes.length) return '<p style="color:#999;">لا توجد تصنيفات</p>';
        let html = '<ul class="tree">';
        for (const node of nodes) {
            html += `<li>
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;width:100%;">
                    <div style="display:flex;align-items:center;gap:0.5rem;">
                        ${node.imageUrl ? `<img src="${node.imageUrl}" style="width:30px;height:30px;border-radius:50%;">` : '<i class="fas fa-folder"></i>'}
                        <strong>${node.name}</strong>
                    </div>
                    <div>
                        <button class="btn-sm btn-danger" onclick="deleteCategory('${node.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
                ${node.children && node.children.length ? renderTree(node.children) : ''}
            </li>`;
        }
        html += '</ul>';
        return html;
    }

    async function deleteCategory(id) {
        if (confirm('حذف التصنيف سيؤثر على المنتجات المرتبطة. متأكد؟')) {
            await db.collection('categories').doc(id).delete();
            loadCategories();
            loadParentSelect();
        }
    }

    async function logout() { await auth.signOut(); window.location.href = 'admin.html'; }

    window.deleteCategory = deleteCategory;
    window.logout = logout;
</script>

</body>
</html>
