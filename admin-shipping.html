<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الشحن | متجر أولاد شعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; }
        :root {
            --sky-blue: #00B4D8;
            --gold-dark: #B8860B;
            --gold-light: #DAA520;
            --green-light: #90E0EF;
            --dark-bg: #1a2a3a;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header {
            background: var(--dark-bg);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo { font-size: 1.3rem; font-weight: 800; color: var(--gold-light); }
        .logo span { color: var(--sky-blue); }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 0.5rem 1rem; border-radius: 25px; cursor: pointer; }
        .container { padding: 2rem 5%; }
        .back-link { display: inline-block; margin-bottom: 1rem; color: var(--sky-blue); text-decoration: none; }
        .payment-numbers {
            background: linear-gradient(135deg, var(--sky-blue), var(--green-light));
            padding: 1.5rem;
            border-radius: 20px;
            color: white;
            margin-bottom: 2rem;
        }
        .payment-numbers h3 { margin-bottom: 0.5rem; }
        .payment-numbers p { margin: 0.5rem 0; font-size: 1.2rem; }
        .grid-2col { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .card { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: var(--shadow); }
        .card h3 { color: var(--gold-dark); margin-bottom: 1rem; }
        form input, form select { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        button { background: var(--sky-blue); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 30px; cursor: pointer; margin-top: 1rem; }
        .items-list { margin-top: 1rem; }
        .list-item { background: #f9f9f9; padding: 0.8rem; margin: 0.5rem 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .delete-item { background: #dc3545; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 5px; cursor: pointer; }
        .edit-item { background: var(--gold-dark); color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 5px; cursor: pointer; margin-left: 0.5rem; }
        @media (max-width: 768px) { .grid-2col { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">أولاد <span>شعلان</span> | إعدادات الشحن</div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
</header>

<div class="container">
    <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>
    
    <div class="payment-numbers">
        <h3><i class="fas fa-money-bill-wave"></i> أرقام الدفع (تظهر للعميل)</h3>
        <p><i class="fab fa-instalod"></i> إنستاباي: <strong>01063835028</strong></p>
        <p><i class="fas fa-wallet"></i> محفظة إي أند: <strong>01120282953</strong></p>
        <p><i class="fas fa-wallet"></i> فودافون كاش: <strong>01068385028</strong></p>
        <p style="margin-top: 0.5rem; font-size: 0.9rem;"><i class="fas fa-info-circle"></i> رسوم السحب من المحافظ: <strong>5 جنيه إضافية</strong></p>
    </div>
    
    <div class="grid-2col">
        <!-- إدارة البلدان والمدن -->
        <div class="card">
            <h3><i class="fas fa-globe"></i> إدارة البلدان والمدن</h3>
            <form id="countryForm">
                <input type="text" id="countryName" placeholder="اسم البلد (مصر)" required>
                <button type="submit">إضافة بلد</button>
            </form>
            <div id="countriesList" class="items-list"></div>
            
            <form id="cityForm" style="margin-top: 1.5rem;">
                <select id="cityCountry" required><option value="">اختر البلد</option></select>
                <input type="text" id="cityName" placeholder="اسم المدينة (القاهرة)" required>
                <input type="number" id="cityShippingCost" placeholder="تكلفة الشحن" required>
                <button type="submit">إضافة مدينة</button>
            </form>
            <div id="citiesList" class="items-list"></div>
        </div>
        
        <!-- إعدادات السلة والدفع -->
        <div class="card">
            <h3><i class="fas fa-cogs"></i> إعدادات السلة</h3>
            <form id="settingsForm">
                <label>الحد الأدنى للطلب (لتفعيل الشحن)</label>
                <input type="number" id="minOrderAmount" placeholder="مثال: 100 جنيه">
                <label>تكلفة الشحن الثابتة (إذا لم تكن مدينة محددة)</label>
                <input type="number" id="defaultShippingCost" placeholder="مثال: 50 جنيه">
                <label>نسبة الضريبة (إذا وجدت)</label>
                <input type="number" id="taxPercentage" placeholder="مثال: 14">
                <button type="submit">حفظ الإعدادات</button>
            </form>
            <div id="currentSettings" style="margin-top: 1rem; padding: 1rem; background: #f0f2f5; border-radius: 10px;"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD5tuzZf8VTqT2J8MSZ5zLnzbqRsT_lipA",
        authDomain: "awlad-sh3lan-store.firebaseapp.com",
        projectId: "awlad-sh3lan-store",
        storageBucket: "awlad-sh3lan-store.firebasestorage.app",
        messagingSenderId: "77191704198",
        appId: "1:77191704198:web:d2ce184d9c8ec2e876eb07"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'admin-login.html'; return; }
        const adminDoc = await db.collection('admins').doc(user.uid).get();
        if (!adminDoc.exists) { await auth.signOut(); window.location.href = 'admin-login.html'; return; }
        loadCountries();
        loadCities();
        loadSettings();
        loadCountrySelect();
    });
    
    // إضافة بلد
    document.getElementById('countryForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('countryName').value;
        await db.collection('countries').add({ name, createdAt: new Date().toISOString() });
        alert('تم إضافة البلد');
        document.getElementById('countryForm').reset();
        loadCountries();
        loadCountrySelect();
    });
    
    // إضافة مدينة
    document.getElementById('cityForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        await db.collection('cities').add({
            countryId: document.getElementById('cityCountry').value,
            name: document.getElementById('cityName').value,
            shippingCost: parseFloat(document.getElementById('cityShippingCost').value)
        });
        alert('تم إضافة المدينة');
        document.getElementById('cityForm').reset();
        loadCities();
    });
    
    async function loadCountries() {
        const snapshot = await db.collection('countries').get();
        const container = document.getElementById('countriesList');
        if (!container) return;
        container.innerHTML = '<strong>البلدان:</strong><br>' + snapshot.docs.map(doc => `
            <div class="list-item">
                <span>${doc.data().name}</span>
                <button class="delete-item" onclick="deleteCountry('${doc.id}')">حذف</button>
            </div>
        `).join('');
    }
    
    async function loadCities() {
        const snapshot = await db.collection('cities').get();
        const container = document.getElementById('citiesList');
        if (!container) return;
        const citiesWithCountry = [];
        for (const doc of snapshot.docs) {
            const city = doc.data();
            const countryDoc = await db.collection('countries').doc(city.countryId).get();
            const countryName = countryDoc.exists ? countryDoc.data().name : 'غير معروف';
            citiesWithCountry.push({ id: doc.id, name: city.name, countryName, shippingCost: city.shippingCost });
        }
        container.innerHTML = '<strong>المدن:</strong><br>' + citiesWithCountry.map(c => `
            <div class="list-item">
                <span>${c.countryName} - ${c.name} (${c.shippingCost} جنيه)</span>
                <div><button class="edit-item" onclick="editCity('${c.id}')">تعديل</button><button class="delete-item" onclick="deleteCity('${c.id}')">حذف</button></div>
            </div>
        `).join('');
    }
    
    async function loadCountrySelect() {
        const snapshot = await db.collection('countries').get();
        const select = document.getElementById('cityCountry');
        select.innerHTML = '<option value="">اختر البلد</option>' + snapshot.docs.map(doc => `<option value="${doc.id}">${doc.data().name}</option>`).join('');
    }
    
    async function deleteCountry(id) {
        if (confirm('حذف البلد سيؤدي لحذف جميع المدن التابعة له. هل أنت متأكد؟')) {
            const cities = await db.collection('cities').where('countryId', '==', id).get();
            cities.forEach(doc => db.collection('cities').doc(doc.id).delete());
            await db.collection('countries').doc(id).delete();
            loadCountries();
            loadCities();
            loadCountrySelect();
        }
    }
    
    async function deleteCity(id) {
        if (confirm('هل أنت متأكد؟')) {
            await db.collection('cities').doc(id).delete();
            loadCities();
        }
    }
    
    function editCity(id) {
        const newCost = prompt('أدخل تكلفة الشحن الجديدة');
        if (newCost) {
            db.collection('cities').doc(id).update({ shippingCost: parseFloat(newCost) });
            loadCities();
        }
    }
    
    // إعدادات الشحن
    document.getElementById('settingsForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const settings = {
            minOrderAmount: parseFloat(document.getElementById('minOrderAmount').value) || 0,
            defaultShippingCost: parseFloat(document.getElementById('defaultShippingCost').value) || 0,
            taxPercentage: parseFloat(document.getElementById('taxPercentage').value) || 0,
            updatedAt: new Date().toISOString()
        };
        const settingsDoc = await db.collection('settings').doc('shipping').get();
        if (settingsDoc.exists) {
            await db.collection('settings').doc('shipping').update(settings);
        } else {
            await db.collection('settings').doc('shipping').set(settings);
        }
        alert('تم حفظ الإعدادات');
        loadSettings();
    });
    
    async function loadSettings() {
        const doc = await db.collection('settings').doc('shipping').get();
        const container = document.getElementById('currentSettings');
        if (!container) return;
        if (doc.exists) {
            const s = doc.data();
            container.innerHTML = `
                <strong>الإعدادات الحالية:</strong><br>
                الحد الأدنى للطلب: ${s.minOrderAmount || 0} جنيه<br>
                تكلفة الشحن الافتراضية: ${s.defaultShippingCost || 0} جنيه<br>
                نسبة الضريبة: ${s.taxPercentage || 0}%
            `;
            document.getElementById('minOrderAmount').value = s.minOrderAmount || '';
            document.getElementById('defaultShippingCost').value = s.defaultShippingCost || '';
            document.getElementById('taxPercentage').value = s.taxPercentage || '';
        } else {
            container.innerHTML = 'لم يتم حفظ إعدادات بعد';
        }
    }
    
    async function logout() { await auth.signOut(); window.location.href = 'admin-login.html'; }
    
    window.deleteCountry = deleteCountry;
    window.deleteCity = deleteCity;
    window.editCity = editCity;
    window.logout = logout;
</script>

</body>
</html>
